    title:'Chapter 4: Relationships Between Variables',
    body:`Now you want to go deeper: is there a relationship between how much time users spend on the app and their satisfaction? This is BIVARIATE analysis вҖ” looking at two variables together.

The scatterplot is your first tool. Plot time (x) against satisfaction (y) and see if there's a pattern. Correlation (r) quantifies this: r close to +1 means more time = more satisfaction, r close to -1 means the opposite, r near 0 means no linear pattern.

But here's where it gets interesting. You can go further than just "there's a relationship" вҖ” you can build a PREDICTION EQUATION. Linear regression gives you Е· = a + bx, a line that predicts satisfaction from time spent. The slope b tells you: "for each extra hour of app use, satisfaction increases by b points." The intercept a is the predicted satisfaction for someone who never uses the app.

RВІ tells you how GOOD this prediction is. If RВІ = 0.75, your model explains 75% of the variation in satisfaction. The remaining 25% is due to other factors you haven't measured.

But watch out for SIMPSON'S PARADOX: the relationship you see overall might REVERSE when you look at subgroups. Maybe more time leads to higher satisfaction for casual users, but LOWER satisfaction for power users (because they hit more bugs). If you ignore this, you'll draw the wrong conclusion. This is why confounding variables matter so much.`

    title:'Chapter 5: The Magic Bridge вҖ” Sampling Distributions',
    body:`This is the conceptual heart of the entire course. Everything before this was preparation; everything after this depends on understanding this concept.

Here's the key insight: if you took your survey 1000 times (each time sampling 500 different users), you'd get a DIFFERENT mean satisfaction each time. Maybe 7.2, then 7.1, then 7.4, then 7.15... These aren't identical because each sample is slightly different.

The distribution of ALL those sample means IS the sampling distribution. And the Central Limit Theorem makes a remarkable guarantee: no matter what the original data looks like, this distribution of sample means will be approximately NORMAL (bell-shaped) as long as your sample is large enough (n вүҘ 30).

Why does this matter? Because the normal distribution is mathematically well-understood. We can calculate exact probabilities with it. The Standard Error (SE = Пғ/вҲҡn) tells us how spread out these sample means are. Larger samples вҶ’ smaller SE вҶ’ sample means cluster more tightly around the true population mean.

This is the BRIDGE between your sample and the population. Your one sample mean of 7.2 is just one point on this sampling distribution. But knowing the shape and spread of this distribution lets you say things like "I'm 95% confident the true mean is between 7.0 and 7.4." That's a confidence interval, and it's built entirely on this sampling distribution concept.

When Пғ is unknown (which is almost always), we use s instead, and the distribution becomes a t-distribution вҖ” similar to normal but with slightly heavier tails to account for the extra uncertainty.`
  },
  {
    title:'Chapter 6: Making Estimates вҖ” Confidence Intervals',
    body:`Now we use the sampling distribution to make our first real inference. A confidence interval says: "based on my sample, here is a range of plausible values for the true population parameter."

For a mean: take your sample mean, then go t* standard errors in each direction. That gives you xМ„ Вұ t* Г— (s/вҲҡn). For a proportion: ПҖМӮ Вұ z* Г— SE.

The interpretation is subtle and the exam will test you on it: "We are 95% confident that the true population mean lies in this interval" does NOT mean there's a 95% probability. The true mean is a fixed number вҖ” it's either in the interval or it's not. What 95% means is: if we repeated this process many times, 95% of the intervals we'd construct would contain the true mean.

You can also work backwards: "how large does my sample need to be to get a margin of error of Вұ0.67%?" This is the sample size formula, and it appears on every exam.`
  },
  {
    title:'Chapter 7: Making Decisions вҖ” Hypothesis Testing',
    body:`Confidence intervals estimate. Hypothesis tests DECIDE. "Is the true satisfaction above 7?" "Is there a difference between iOS and Android users?" These are yes/no questions, and hypothesis testing provides a framework to answer them.

The logic is beautifully simple (even if the math isn't): assume the boring answer is true (HвӮҖ: no effect, no difference). Then ask: "if the boring answer were true, how likely is it that I'd see data this extreme?" That probability is the p-value.

If the p-value is tiny (below your threshold Оұ, usually 0.05), you reject the boring answer вҖ” the data is too surprising to be explained by "nothing is happening." If the p-value is large, you shrug and say "I can't rule out that nothing is happening."

Every test follows the same 5 steps: assumptions вҶ’ hypotheses вҶ’ test statistic вҶ’ p-value вҶ’ conclusion. The test statistic is always the same idea: (what you observed вҲ’ what you expected) / uncertainty. For a proportion, that's a z-test. For a mean, that's a t-test. The formula changes but the logic never does.

And you CAN be wrong. Type I error: you reject HвӮҖ when it was actually true (false alarm). Type II error: you fail to reject HвӮҖ when it was actually false (missed signal). There's always a trade-off вҖ” decreasing one increases the other. The COVID test example from the exam makes this vivid: missing an infection (Type II) is worse than a false positive (Type I), so you want a larger Оұ to catch more cases.`
  },
  {
    title:'Chapter 8: Comparing Groups',
    body:`Most interesting research questions compare groups. "Do iOS users spend more time than Android users?" "Did satisfaction improve after the redesign?"

The critical first question: are the observations PAIRED or INDEPENDENT? If you measured the SAME users before and after the redesign, those are paired вҖ” compute the differences, then do a one-sample t-test on the differences. If you compared completely different users, those are independent вҖ” use a two-sample t-test.

For proportions (e.g., "is the percentage of 5-star reviews different between iOS and Android?"), use a z-test for two proportions. The logic is always the same: how far apart are the groups compared to how much variability there is?`
  },
  {
    title:'Chapter 9: When Both Variables Are Categorical',
    body:`What if both your variables are categories? "Is the distribution of app categories different between free and paid apps?" You can't compute a mean вҖ” both variables are nominal.

Enter the chi-square test. You build a table of observed counts, calculate what you'd EXPECT if the variables were truly independent, then measure how far apart observed and expected are. Large differences вҶ’ large ПҮВІ вҶ’ evidence that the variables are associated.

After finding a significant chi-square, standardized residuals tell you WHERE the action is. A standardized residual of 3.5 for "blue electric cars" means there are way more blue electric cars than you'd expect if color and fuel type were independent.

Odds and odds ratios give you another way to quantify associations. The odds ratio compares the odds of an outcome between two groups. An OR of 3.76 means the first group has nearly 4 times the odds.`
  },
  {
    title:'Chapter 10: Prediction Machines вҖ” Regression',
    body:`Regression is where everything comes together. Simple regression uses one predictor: Е· = a + bx. But real life is complex вҖ” satisfaction probably depends on MANY things: time spent, number of crashes, age of user, country.

Multiple regression handles this: Е· = a + bвӮҒxвӮҒ + bвӮӮxвӮӮ + ... + bвӮҡxвӮҡ. Each coefficient bбөў tells you: "holding everything else constant, a 1-unit increase in xбөў changes the prediction by bбөў." This "holding everything else constant" is the superpower вҖ” it controls for confounding.

Categorical predictors (like gender or country) enter via dummy variables. If species has 3 levels, you need 2 dummies, and one species becomes the reference. The coefficient tells you the difference from that reference.

Interaction terms handle the case where the effect of one variable DEPENDS on another. Maybe age affects body length differently for males vs females вҖ” that's an interaction.

When comparing models, the F-test works if one model is a SUBSET of the other (nested). Otherwise, use AIC or BIC. And always watch for overfitting вҖ” a model with too many variables will fit training data perfectly but predict new data terribly. PRESS (leave-one-out cross-validation) estimates how well you'll do on new data.

Standardized coefficients let you answer "which variable matters most?" by putting everything on the same scale.`
  },
  {
    title:'Chapter 11: The Full Circle',
    body:`Now step back and see the whole picture. Every topic we covered is a link in one chain:

You start with a QUESTION about a population. You COLLECT data carefully to avoid bias. You DESCRIBE what you see. You understand that your sample statistics VARY from sample to sample (sampling distribution). You use that understanding to ESTIMATE the population parameter (confidence interval) or DECIDE a yes/no question (hypothesis test). The specific TEST you use depends on the types of variables involved вҖ” t-test for means, z-test for proportions, chi-square for two categorical variables, regression for prediction.

The test selection table isn't a random list to memorize. It follows a logical structure: What are your variables? What are their scales? How many groups? Paired or not? The answer to each question narrows down which tool to use.

And regression ties it all together вҖ” it's the most general framework. A t-test is actually just a special case of regression. A chi-square table can be understood through the lens of expected vs observed. Everything connects.

Understanding this story вҖ” this flow from question to data to description to inference вҖ” is what separates someone who memorizes formulas from someone who truly understands statistics. And on the exam, understanding WHY you're doing each step is what gets you through the tricky questions.`
  }

  const MISTAKES = [
    {problem:'Testing HвӮҖ: Ој = 50, n = 40, xМ„ = 53, s = 8. Student writes: z = (53 вҲ’ 50) / (8/вҲҡ40) = 2.37',error:'Used z-test instead of t-test',explain:'When Пғ is unknown and we use s, we must use the t-distribution, not z. The calculation is correct, but it should be reported as t = 2.37 with df = 39, and compared to the t-table.',opts:['Wrong formula entirely','Used z instead of t','Calculated SE wrong','Nothing wrong'],ans:1},
    {problem:'CI for proportion: ПҖМӮ = 0.4, n = 100, 95% CI. Student writes: 0.4 Вұ 1.96 Г— вҲҡ(0.4 Г— 0.6 / 100) = [0.304, 0.496]. "There is a 95% probability that ПҖ is in this interval."',error:'Wrong interpretation of CI',explain:'The interval calculation is correct, but the interpretation is wrong. A CI does NOT mean 95% probability. Correct: "We are 95% confident that the true proportion lies in [0.304, 0.496]." The parameter is fixed вҖ” the randomness is in the interval.',opts:['Wrong z* value','SE formula wrong','Wrong interpretation of CI','Calculation error'],ans:2},
    {problem:'Testing HвӮҖ: ПҖ = 0.25, n = 100, ПҖМӮ = 0.32. Student computes SE = вҲҡ(0.32 Г— 0.68 / 100) = 0.0466',error:'Used ПҖМӮ instead of ПҖвӮҖ in SE',explain:'For hypothesis TESTING, the SE must use ПҖвӮҖ (the null value), not ПҖМӮ. Correct SE = вҲҡ(0.25 Г— 0.75 / 100) = 0.0433. Using ПҖМӮ is only correct for confidence intervals.',opts:['Used ПҖМӮ instead of ПҖвӮҖ in SE','Wrong sample size','Should use t not z','Formula is correct'],ans:0},
    {problem:'Regression output: b = 216, SE(b) = 82.7, n = 5000, 4 predictors. Student: t = 216/82.7 = 2.61, df = 5000 вҲ’ 1 = 4999.',error:'Wrong df for regression',explain:'In multiple regression, df = n вҲ’ (p + 1) where p = number of predictors. So df = 5000 вҲ’ 5 = 4995, not 4999. The df = n вҲ’ 1 formula is only for one-sample t-tests.',opts:['t-value calculated wrong','Wrong df for regression','Should use z not t','b and SE are swapped'],ans:1},
    {problem:'Model 1 (age + sex) has SSE = 44M. Model 2 (foot_length) has SSE = 38M. Student uses F-test to compare them.',error:'F-test on non-nested models',explain:'F-test only works when one model is a SUBSET (nested) of the other. Models 1 and 2 have completely different variables вҖ” neither is nested in the other. Must use AIC/BIC instead.',opts:['Should use t-test instead','F-test on non-nested models','SSE values are wrong','Calculation is fine'],ans:1},
    {problem:'Chi-square test: a cell has f_e = 3.2. Student proceeds with the test anyway and reports ПҮВІ = 12.4, p < 0.01.',error:'Violated assumption: f_e < 5',explain:'The chi-square test requires ALL expected frequencies to be вүҘ 5. Having f_e = 3.2 violates this assumption, making the ПҮВІ approximation unreliable. The student should report that assumptions are not met.',opts:['ПҮВІ value is wrong','df calculated wrong','Violated assumption: f_e < 5','p-value is wrong'],ans:2},
    {problem:'RВІ = 0.80. Student writes: "80% of data points fall on the regression line."',error:'Wrong interpretation of RВІ',explain:'RВІ = 0.80 means 80% of the VARIANCE in y is explained by the model вҖ” the prediction error (SSE) is 80% smaller than using just the mean. It does NOT mean 80% of points are on the line.',opts:['RВІ can\'t be 0.80','Wrong interpretation of RВІ','Should report adjusted RВІ','RВІ means correlation'],ans:1},
    {problem:'After getting p = 0.08 with Оұ = 0.05, student concludes: "We accept HвӮҖ вҖ” there is no difference."',error:'Said "accept HвӮҖ" and claimed no difference',explain:'Two mistakes: (1) We never "accept" HвӮҖ вҖ” we "fail to reject" it. (2) Failing to reject doesn\'t mean there\'s no difference вҖ” it means we don\'t have enough evidence. The correct conclusion: "We fail to reject HвӮҖ. There is insufficient evidence to conclude a difference exists."',opts:['p-value is wrong','Оұ should be 0.01','Said "accept HвӮҖ" and claimed no difference','Should reject HвӮҖ'],ans:2},
    // ---- NEW: Exam-sourced error scenarios ----
    {problem:'Regression: Е· = 89.8 + 0.8(age) вҲ’ 3.4(male) вҲ’ 0.7(age Г— male), n = 102. Student says df = 102 вҲ’ 3 = 99.',error:'Wrong df: forgot to count the intercept',explain:'The model has 4 parameters (intercept + 3 slopes), so df = n вҲ’ (p+1) = 102 вҲ’ 4 = 98. Students often forget the intercept counts as a parameter. The formula is always n minus the TOTAL number of estimated coefficients.',opts:['df should be 102 вҲ’ 1','Wrong df: forgot intercept','Interaction term wrong','Nothing wrong'],ans:1},
    {problem:'Standardized coefficient: b = 0.61, s_x = 564, s_y = 4830. Student computes b* = 0.61 Г— (4830/564) = 5.22.',error:'Flipped s_x and s_y in standardized coefficient',explain:'The formula is b* = b Г— (s_x / s_y), NOT s_y / s_x. Correct: b* = 0.61 Г— (564/4830) = 0.07. Remember: you\'re converting from x-units to y-units, so s_x goes on top.',opts:['Used wrong b value','Flipped s_x and s_y','Should use variances not SDs','Formula is correct'],ans:1},
    {problem:'Regression model with n = 5000, 4 predictors. Student calculates PRESS and finds PRESS < SSE, concluding "great prediction quality!"',error:'PRESS should always be > SSE for valid models',explain:'PRESS (leave-one-out) should ALWAYS be larger than SSE because the model was fit on training data. If PRESS < SSE, something went wrong in the calculation. SSE always looks optimistic; PRESS is the honest estimate.',opts:['PRESS < SSE is fine','PRESS should always be > SSE','PRESS and SSE are unrelated','Should use RВІ instead'],ans:1},
    {problem:'Comparing Model 1 (age + beak_length) vs Model 2 (flipper + sex + species). Student uses F-test because "Model 2 has more variables."',error:'F-test on non-nested models (different variables)',explain:'F-test requires one model to be a SUBSET of the other (nested). Model 1 uses age+beak, Model 2 uses flipper+sex+species вҖ” completely different predictors. Having "more variables" doesn\'t make it nested. Use AIC/BIC instead.',opts:['F-test is appropriate here','F-test needs nested models','Should use RВІ only','Should use chi-square'],ans:1},
    {problem:'Testing HвӮҖ: ПҖ = 0.5, HвӮҗ: ПҖ < 0.5, n = 100, ПҖМӮ = 0.46. Student gets z = вҲ’0.8, p = 0.21. Concludes: "We prove 50% own cats."',error:'Cannot "prove" HвӮҖ is true',explain:'Failing to reject HвӮҖ never PROVES it is true. We only say "insufficient evidence to reject HвӮҖ." The true proportion could be 0.48 or 0.45 вҖ” we just couldn\'t detect a difference with this sample. Absence of evidence вү  evidence of absence.',opts:['z-value is wrong','p-value is wrong','Cannot "prove" HвӮҖ is true','Should use t-test'],ans:2},
    {problem:'Possum regression: intercept = 89.8. Student interprets: "A newborn female possum (age=0, sex=female) has head length 89.8mm."',error:'Extrapolation: age = 0 is outside the data range',explain:'The data likely contains adult possums, not newborns. Interpreting the intercept at x = 0 is extrapolation if 0 is outside the observed range of the data. The regression line is only valid within the range of the data used to fit it.',opts:['Intercept is always meaningful','Extrapolation: age=0 outside data','Formula is wrong','Should use median instead'],ans:1},
    {problem:'Student finds r = 0.85 between ice cream sales and drowning deaths. Concludes: "Ice cream causes drowning."',error:'Correlation вү  causation (confounding variable: temperature)',explain:'Strong correlation does NOT imply causation. Both variables are driven by a confounding variable (temperature/summer). Only randomized experiments can establish causation. Observational data can show association but never prove a causal link.',opts:['Correlation is too weak','Correlation вү  causation','Should use regression instead','Data must be wrong'],ans:1},
    {problem:'Chi-square test on 2Г—5 table. Student writes: df = 2 Г— 5 = 10.',error:'Wrong df formula: should be (rвҲ’1)(cвҲ’1)',explain:'For chi-square, df = (rows вҲ’ 1) Г— (cols вҲ’ 1) = (2вҲ’1)(5вҲ’1) = 4. The student multiplied the dimensions instead of subtracting 1 from each first. This is a very common exam mistake.',opts:['df should be 2Г—5вҲ’1 = 9','Wrong df: should be (rвҲ’1)(cвҲ’1)','df = rows+colsвҲ’2','df formula is correct'],ans:1},
    {problem:'Odds ratio = 3.8 for blue cars being electric. Student writes: "Electric cars are 3.8 times more likely to be blue."',error:'Confusing odds with probability',explain:'The odds ratio says the ODDS are 3.8 times higher, not the probability. "3.8 times more likely" implies probability, but odds вү  probability. Correct: "The odds of being blue are 3.8 times higher for electric cars than non-electric cars."',opts:['OR value is wrong','Confusing odds with probability','Should use relative risk','Interpretation is correct'],ans:1},
    {problem:'Student runs 20 hypothesis tests on the same dataset at Оұ = 0.05 and finds 1 significant result. Claims: "We found a real effect!"',error:'Multiple testing: expected 1 false positive from 20 tests',explain:'At Оұ = 0.05, we expect 20 Г— 0.05 = 1 false positive purely by chance. Finding exactly 1 significant result from 20 tests is exactly what we\'d expect under HвӮҖ. Need a correction like Bonferroni (Оұ/20 = 0.0025) or report this is likely a false positive.',opts:['Should use Оұ = 0.01','Multiple testing: expect 1 false positive','The test is valid','Should combine all 20 tests'],ans:1},
    {problem:'Two-sample t-test: group A has nвӮҒ = 15, sвӮҒ = 8. Group B has nвӮӮ = 15, sвӮӮ = 24. Student uses pooled SE assuming equal variances.',error:'Variances clearly unequal (s ratio > 2)',explain:'Rule of thumb: if the larger SD is more than double the smaller (24/8 = 3), the equal-variance assumption is violated. Should use Welch\'s t-test (unequal variances) instead of pooled t-test. The pooled version gives incorrect df and SE here.',opts:['Sample sizes too small','Variances clearly unequal','Should use z-test','Pooled SE is always correct'],ans:1},
    {problem:'Student writes: "95% CI for Ој is (12.3, 15.7). If we repeat the study 100 times, 95 CIs will contain 14.0 (the sample mean)."',error:'CI covers the population mean Ој, not the sample mean',explain:'A CI estimates the POPULATION parameter Ој, not the sample mean xМ„. The sample mean is always in the CI by construction. Correct: "If we repeated the study 100 times, approximately 95 of the CIs would contain the TRUE population mean Ој."',opts:['CI width is wrong','CI covers Ој, not the sample mean','95 is an approximation','Interpretation is correct'],ans:1},
    // ---- LOOP 3: More detective questions from exam patterns ----
    {problem:'Regression: Е· = вҲ’5354 вҲ’ 3.19(beak) + 47.4(flipper) + 33.6(male). Student interprets intercept: "A female penguin with beak=0mm and flipper=0mm weighs вҲ’5354g."',error:'Extrapolation: intercept has no practical meaning here',explain:'No penguin has beak = 0mm and flipper = 0mm. The intercept is a mathematical artifact of the model. Interpreting it as a real prediction is extrapolation to an impossible combination of values far outside the data range.',opts:['Sign should be positive','Extrapolation: intercept meaningless','Should be male not female','Formula is wrong'],ans:1},
    {problem:'Student computes RВІ = (TSS вҲ’ SSE)/TSS = (220M вҲ’ 44M)/220M = 0.80. Then says: "The correlation between Y and X is 0.80."',error:'Confused RВІ with r (correlation)',explain:'RВІ = 0.80 means 80% of variance explained. The correlation r = вҲҡRВІ = вҲҡ0.80 вүҲ 0.89, NOT 0.80. In multiple regression, R is the multiple correlation coefficient (0.89 here), which is different from RВІ.',opts:['RВІ calculation is wrong','Confused RВІ with r','RВІ can\'t be 0.80','Should use adjusted RВІ'],ans:1},
    {problem:'Comparing two non-nested models. Student reports: "F = 3.2, p = 0.04. Model 2 is significantly better." But Model 1 has predictors age+sex and Model 2 has predictors height+weight.',error:'Cannot use F-test on non-nested models',explain:'F-test ONLY works for nested model comparison вҖ” where one model is a subset of the other. age+sex vs height+weight are completely different predictors (non-nested). Must use AIC, BIC, or cross-validation to compare them.',opts:['F-value is wrong','p-value wrong','Cannot use F-test on non-nested models','Conclusion is fine'],ans:2},
    {problem:'Student uses stratified random sampling but defines strata by student motivation level (high/medium/low). Motivation is self-assessed via a questionnaire.',error:'Strata based on unmeasured/self-reported variable before sampling',explain:'To stratify, you need to know strata membership BEFORE sampling. Self-assessed motivation isn\'t known until after you survey people. You can\'t stratify on a variable you haven\'t measured yet. Use observable characteristics (e.g., department, year) as strata.',opts:['Strata must be equal size','Strata based on unknown variable','Too many strata','Sampling is random enough'],ans:1},
    {problem:'621 of 650 published articles report p < 0.05. Student computes: expected Type I errors = 621 Г— 0.05 = 31. Then says: "31 articles committed fraud."',error:'Type I errors are not fraud вҖ” they are expected false positives',explain:'Type I errors occur by chance, not fraud. At Оұ = 0.05, we EXPECT 5% of true-null studies to be significant. The 31 estimated false positives are a natural consequence of the significance threshold. Publication bias (preferentially publishing significant results) is the real issue, not fraud.',opts:['Calculation is wrong','Type I errors are not fraud','Should use Оұ = 0.01','All 621 are real effects'],ans:1},
    {problem:'Regression output shows b = 216 for "seats" with p = 0.009. Student concludes: "Adding one extra seat to a car CAUSES the price to increase by $216."',error:'Regression shows association, not causation',explain:'This is observational data (used cars), not an experiment. The relationship between seats and price could be confounded by car type (SUVs have more seats AND cost more). Without randomized assignment, we can only say seats are ASSOCIATED with higher price, not that they CAUSE it.',opts:['b value is wrong','p-value not significant','Regression shows association, not causation','Interpretation is correct'],ans:2},
    {problem:'Student performs a one-sided test (HвӮҗ: Ој > 50) and gets p = 0.03 with t = 2.1. Then reports: "Two-sided p-value = 0.03."',error:'One-sided p вү  two-sided p (two-sided = 2 Г— one-sided)',explain:'For a one-sided test with p = 0.03, the corresponding two-sided p-value would be 2 Г— 0.03 = 0.06. The student confused the two. If the test was one-sided, the p-value reported should specify this. Two-sided p = 0.06 would NOT be significant at Оұ = 0.05.',opts:['t-value is wrong','One-sided p вү  two-sided p','Should use z not t','p-value is correct'],ans:1},

    {problem:'Regression with n = 344. Model has beak_length, flipper_length, sex. Student includes species (3 levels) using 3 dummy variables.',error:'k categories need kвҲ’1 dummies, not k',explain:'Species has 3 levels (Adelie, Chinstrap, Gentoo) but only needs 2 dummy variables. Using 3 creates perfect collinearity (the 3rd is determined by the other 2). One category must be the reference level. k categories вҶ’ kвҲ’1 dummies.',opts:['Should use 1 dummy','k categories need kвҲ’1 dummies','All categories need a dummy','Should use 4 dummies'],ans:1},
    {problem:'Student reports: "The adjusted RВІ of 0.82 means 82% of the data points are correctly predicted by the model."',error:'Wrong interpretation of adjusted RВІ',explain:'Adjusted RВІ is a penalty-adjusted measure of variance explained, NOT the proportion of correct predictions. Adjusted RВІ = 0.82 means 82% of variance in Y is explained after penalizing for the number of predictors. It does not count "correct" individual predictions.',opts:['Adjusted RВІ can\'t be 0.82','Wrong interpretation of adjusted RВІ','Should report RВІ not adjusted','Value should be negative'],ans:1},
    {problem:'Comparing 3 group means with three separate two-sample t-tests (A vs B, A vs C, B vs C) each at Оұ = 0.05.',error:'Multiple comparisons inflate Type I error rate',explain:'With 3 tests at Оұ = 0.05, the family-wise error rate is 1 вҲ’ (0.95)Ві вүҲ 0.14 вҖ” almost 3Г— the desired rate. Should use ANOVA first, then post-hoc tests with Bonferroni correction (Оұ/3 = 0.017 per test) if the F-test is significant.',opts:['Should use paired t-tests','Multiple comparisons inflate Type I','Sample sizes too small','Tests are valid separately'],ans:1},
    {problem:'Student calculates SE for a confidence interval of a proportion: SE = вҲҡ(ПҖвӮҖ(1вҲ’ПҖвӮҖ)/n) using the null value ПҖвӮҖ = 0.5.',error:'CI uses ПҖМӮ, not ПҖвӮҖ for SE',explain:'For confidence intervals, the SE must use ПҖМӮ (the sample proportion), NOT ПҖвӮҖ. The null value ПҖвӮҖ is only used for hypothesis TEST standard errors. For CI: SE = вҲҡ(ПҖМӮ(1вҲ’ПҖМӮ)/n). This is a critical distinction the exam tests repeatedly.',opts:['CI uses ПҖМӮ not ПҖвӮҖ for SE','Formula is correct for CI','Should use t not z','n is too small'],ans:0},

    {setup:'One-sample t-test on income data (n = 12). The histogram is heavily right-skewed with one extreme outlier.',violated:'Normality assumption with small n',explain:'With only n = 12, the t-test is NOT robust to skewness. The CLT only kicks in around n вүҘ 30. Extreme skewness + small n = unreliable results. Either transform the data, use a nonparametric test, or collect more observations.',opts:['All assumptions met','Normality assumption with small n','Independence violated','Wrong test entirely'],ans:1},

    {q:'SD from previous: ОЈ(xбөўвҲ’xМ„)ВІ = 8, n = 3. s = ?',opts:['2.0','вҲҡ4 = 2.0','вҲҡ(8/3) вүҲ 1.63','вҲҡ8 вүҲ 2.83'],ans:0,explain:'sВІ = ОЈ(xбөўвҲ’xМ„)ВІ/(nвҲ’1) = 8/2 = 4, so s = вҲҡ4 = 2.0'},
    {q:'z-score: x = 100, xМ„ = 85, s = 10. z = ?',opts:['1.5','вҲ’1.5','0.15','15'],ans:0,explain:'z = (x вҲ’ xМ„)/s = (100вҲ’85)/10 = 15/10 = 1.5'},
    {q:'CI for proportion: ПҖМӮ = 0.6, n = 400, z* = 1.96. ME = ?',opts:['вүҲ 0.048','вүҲ 0.024','вүҲ 0.096','вүҲ 0.060'],ans:0,explain:'SE = вҲҡ(0.6Г—0.4/400) = вҲҡ(0.0006) вүҲ 0.0245. ME = 1.96 Г— 0.0245 вүҲ 0.048'},
    {q:'Pooled proportion: xвӮҒ=30, nвӮҒ=100, xвӮӮ=50, nвӮӮ=200. ПҖМӮвӮҡ = ?',opts:['80/300 вүҲ 0.267','0.350','0.400','0.300'],ans:0,explain:'ПҖМӮвӮҡ = (xвӮҒ+xвӮӮ)/(nвӮҒ+nвӮӮ) = (30+50)/(100+200) = 80/300 вүҲ 0.267'},
    {q:'IQR: Q1 = 22, Q3 = 38. IQR = ?',opts:['16','60','30','8'],ans:0,explain:'IQR = Q3 вҲ’ Q1 = 38 вҲ’ 22 = 16'},
    {q:'Outlier fence: Q3 = 38, IQR = 16. Upper fence = ?',opts:['62','54','46','70'],ans:0,explain:'Upper fence = Q3 + 1.5Г—IQR = 38 + 24 = 62'},
    {q:'Regression prediction: Е· = 10 + 3x. If x = 5, Е· = ?',opts:['25','15','50','35'],ans:0,explain:'Е· = 10 + 3(5) = 10 + 15 = 25'},
    {q:'Dummy coding: variable has levels A,B,C,D. How many dummies?',opts:['3','4','2','1'],ans:0,explain:'k вҲ’ 1 = 4 вҲ’ 1 = 3 dummy variables (one level is reference)'},
    {q:'SE for difference of means: SEвӮҒ=2, SEвӮӮ=3. SE_diff = ?',opts:['вҲҡ13 вүҲ 3.61','5','вҲҡ5 вүҲ 2.24','1'],ans:0,explain:'SE = вҲҡ(SEвӮҒВІ + SEвӮӮВІ) = вҲҡ(4+9) = вҲҡ13 вүҲ 3.61'},
    // ---- LOOP 4: More calc questions ----
    {q:'One-sample t-stat: xМ„=53, ОјвӮҖ=50, s=8, n=40. t = ?',opts:['вүҲ 2.37','вүҲ 0.375','вүҲ 3.75','вүҲ 6.63'],ans:0,explain:'t = (xМ„вҲ’ОјвӮҖ)/(s/вҲҡn) = (53вҲ’50)/(8/вҲҡ40) = 3/1.265 вүҲ 2.37'},
    {q:'Proportion SE for CI: ПҖМӮ=0.6, n=225. SE = ?',opts:['вүҲ 0.033','вүҲ 0.6','вүҲ 0.004','вүҲ 0.327'],ans:0,explain:'SE = вҲҡ(ПҖМӮ(1вҲ’ПҖМӮ)/n) = вҲҡ(0.6Г—0.4/225) = вҲҡ(0.00107) вүҲ 0.0327'},
    {q:'RВІ from SST and SSR: SST=1000, SSR=750. RВІ = ?',opts:['0.75','0.25','3.0','0.33'],ans:0,explain:'RВІ = SSR/SST = 750/1000 = 0.75 (or equivalently 1 вҲ’ SSE/SST = 1 вҲ’ 250/1000)'},
    {q:'Adjusted RВІ: RВІ=0.80, n=50, p=4. Adj RВІ = ?',opts:['вүҲ 0.782','вүҲ 0.80','вүҲ 0.75','вүҲ 0.818'],ans:0,explain:'Adj RВІ = 1 вҲ’ (1вҲ’RВІ)(nвҲ’1)/(nвҲ’pвҲ’1) = 1 вҲ’ 0.20Г—(49/45) = 1 вҲ’ 0.2178 вүҲ 0.782'},
    {q:'Two-proportion z: ПҖМӮвӮҒ=0.30, ПҖМӮвӮӮ=0.20, ПҖМӮвӮҡ=0.25, nвӮҒ=nвӮӮ=100. z = ?',opts:['вүҲ 1.63','вүҲ 10.0','вүҲ 0.10','вүҲ 2.31'],ans:0,explain:'SE = вҲҡ(ПҖМӮвӮҡ(1вҲ’ПҖМӮвӮҡ)(1/nвӮҒ+1/nвӮӮ)) = вҲҡ(0.25Г—0.75Г—0.02) = вҲҡ0.00375 вүҲ 0.0612. z = (0.30вҲ’0.20)/0.0612 вүҲ 1.63'},
    {q:'chi-square expected: row=80, col=60, total=400. fвӮ‘ = ?',opts:['12','140','4800','20'],ans:0,explain:'fвӮ‘ = (rowГ—col)/total = (80Г—60)/400 = 4800/400 = 12'},
    {q:'df for two-sample (equal var): nвӮҒ=25, nвӮӮ=30. df = ?',opts:['53','54','55','52'],ans:0,explain:'df = nвӮҒ + nвӮӮ вҲ’ 2 = 25 + 30 вҲ’ 2 = 53'},
    {q:'Regression: SST=400, RВІ=0.60. What is SSE?',opts:['160','240','400','600'],ans:0,explain:'RВІ = 1 вҲ’ SSE/SST вҶ’ SSE = SST(1вҲ’RВІ) = 400 Г— 0.40 = 160'},
    {q:'Odds ratio: OddsвӮҒ=0.5, OddsвӮӮ=0.2. OR = ?',opts:['2.5','0.4','0.3','0.1'],ans:0,explain:'OR = OddsвӮҒ/OddsвӮӮ = 0.5/0.2 = 2.5'},
    {q:'Median position in n=15 sorted values?',opts:['8th value','7th value','7.5th value','15th value'],ans:0,explain:'Median position = (n+1)/2 = 16/2 = 8th value when n is odd'},
    {q:'Q1 position in n=20 sorted values?',opts:['5.25th','5th','6th','4th'],ans:0,explain:'Q1 = 0.25(n+1) = 0.25(21) = 5.25th position (interpolate between 5th and 6th)'},
    {q:'Relative frequency: 45 out of 300 total. Rel freq = ?',opts:['0.15','0.45','15%','Both 0.15 and 15%'],ans:3,explain:'Relative frequency = 45/300 = 0.15 = 15%. Both representations are correct.'},
  ];

  // Build exam simulator pool: tag each question with its type for rendering
  const EXAM_POOL = [
    ...SCENARIOS.map(q=>({...q,_type:'selector'})),
    ...MISTAKES.map(q=>({...q,_type:'detective'})),
    ...ASSUMPTIONS.map(q=>({...q,_type:'assumptions'})),
    ...OUTPUTS.map(q=>({...q,_type:'output'})),
    ...SPEED_QS.map(q=>({...q,_type:'speed'})),
  ];

  // Game states
  const [gameMode,setGameMode]=useState(null); // 'selector','detective','speed','assumptions','output','calc','exam'
  const [gIdx,setGIdx]=useState(0);
  const [gScore,setGScore]=useState(0);
  const [gStreak,setGStreak]=useState(0);
  const [gBest,setGBest]=useState(0);
  const [gAns,setGAns]=useState(null);
  const [gTimer,setGTimer]=useState(0);
  const [gRunning,setGRunning]=useState(false);
  const [gHistory,setGHistory]=useState([]);
  const [gItems,setGItems]=useState([]);

  const shuffleArr = (arr) => {const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};

  const startGame = (mode) => {
    const pool = {selector:SCENARIOS,detective:MISTAKES,speed:SPEED_QS,assumptions:ASSUMPTIONS,output:OUTPUTS,calc:CALC_QS,exam:EXAM_POOL};
    const counts = {selector:10,detective:10,speed:999,assumptions:10,output:10,calc:12,exam:20};
    const items = shuffleArr(pool[mode]||[]).slice(0,counts[mode]||10);
    setGItems(items);setGameMode(mode);setGIdx(0);setGScore(0);setGStreak(0);setGBest(0);setGAns(null);setGHistory([]);
    if(mode==='speed'||mode==='calc'){setGTimer(mode==='calc'?90:60);setGRunning(true);}else{setGTimer(0);setGRunning(false);}
  };

  // Timer effect for speed round
  useEffect(()=>{
    if(!gRunning||gTimer<=0)return;
    const id=setInterval(()=>setGTimer(t=>{if(t<=1){setGRunning(false);return 0;}return t-1;}),1000);
    return()=>clearInterval(id);
  },[gRunning,gTimer]);

  const handleGameAnswer = (selIdx) => {
    if(gAns!==null)return;
    const item=gItems[gIdx];
    let isCorrect;
    const effType = item._type||gameMode;
    if(effType==='output') isCorrect = selIdx===item.idx;
    else if(effType==='selector') isCorrect = item.opts[selIdx]===item.ans;
    else if(typeof item.ans==='number') isCorrect = selIdx===item.ans;
    else isCorrect = item.opts[selIdx]===item.ans;
    setGAns(selIdx);
    if(isCorrect){setGScore(s=>s+1);setGStreak(s=>{const n=s+1;setGBest(b=>Math.max(b,n));return n;});}
    else{setGStreak(0);}
    setGHistory(h=>[...h,isCorrect]);
    const timedNow = gameMode==='speed'||gameMode==='calc';
    if(timedNow){
      setTimeout(()=>{
        if(gIdx<gItems.length-1){setGIdx(i=>i+1);setGAns(null);}
        else{setGRunning(false);}
      },isCorrect?400:1200);
    }
  };

  const nextGameQ = () => {if(gIdx<gItems.length-1){setGIdx(i=>i+1);setGAns(null);}else{setGRunning(false);}};

  const FormulaRow = ({label,tex,note,syms}) => (
    <div className="formula-row">
      <div className="formula-row-left">
        <div className="formula-row-label">{label}</div>
        <K tex={tex} display={true}/>
        {note && <div className="formula-row-note">{note}</div>}
      </div>
      <div className="formula-row-right">
        {syms.map(([stex,desc],i)=>(
          <div className="sym-row" key={i}>
            <span className="sym-k"><K tex={stex}/></span>
            <span className="sym-eq">=</span>
            <span className="sym-desc">{desc}</span>
          </div>
        ))}
      </div>
    </div>
  );

  const renderFormulas = () => (
    <div className="fade-up">
      <h2>Formula Sheet</h2>
      <p className="subtitle">Each formula with its symbols explained on the right</p>
      {FORMULAS.map((sec,si)=>(
        <div key={si} style={{marginBottom:16}}>
          <h3 style={{margin:'16px 0 4px'}}>{sec.t}</h3>
          <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:10,fontStyle:'italic'}}>{sec.desc}</p>
          {sec.fs.map((f,i)=><FormulaRow key={i} {...f}/>)}
        </div>
      ))}
      <div className="card stripe-amber"><h3>Critical Values</h3>
        <div className="table-wrap"><table><thead><tr><th>Confidence</th><th>z*</th><th>Use</th></tr></thead><tbody>
          <tr><td>90%</td><td>1.645</td><td>Narrower, less common</td></tr>
          <tr><td>95%</td><td>1.960</td><td>Default standard</td></tr>
          <tr><td>99%</td><td>2.576</td><td>Wider, more confident</td></tr>
        </tbody></table></div>
      </div>
      <div className="card stripe-green"><h3>Which Formula Do I Use?</h3>
        <div className="table-wrap"><table><thead><tr><th>Situation</th><th>Formula</th></tr></thead><tbody>
          <tr><td>Summarize center</td><td>Mean or Median</td></tr>
          <tr><td>Summarize spread</td><td>SD or IQR</td></tr>
          <tr><td>Compare value to group</td><td>Z-score</td></tr>
          <tr><td>Estimate population mean</td><td>CI for mean (t*)</td></tr>
          <tr><td>Estimate population proportion</td><td>CI for proportion (z*)</td></tr>
          <tr><td>Test one mean = value</td><td>One-sample t-test</td></tr>
          <tr><td>Test one proportion = value</td><td>One-sample z-test</td></tr>
          <tr><td>Compare 2 independent means</td><td>Two-sample t-test</td></tr>
          <tr><td>Compare same subjects twice</td><td>Paired t-test</td></tr>
          <tr><td>Compare 2 proportions</td><td>Two-proportion z-test</td></tr>
          <tr><td>Test 2 categorical variables</td><td>Chi-square test</td></tr>
          <tr><td>Predict y from x</td><td>Regression</td></tr>
          <tr><td>Test if predictor matters</td><td>t = b / SE(b)</td></tr>
          <tr><td>Compare nested models</td><td>F-test</td></tr>
          <tr><td>Compare non-nested models</td><td>AIC / BIC</td></tr>
          <tr><td>Strongest predictor</td><td>Largest |b*|</td></tr>
        </tbody></table></div>
      </div>
    </div>
  );

  const renderGames = () => {
    if(!gameMode) return(
      <div className="fade-up">
        <h2>Learning Games</h2>
        <p className="subtitle">Active recall through gamified practice</p>
        {[
          {id:'selector',title:'Test Selector Challenge',desc:`${SCENARIOS.length} scenarios вҖ” pick the correct statistical test. 10 per round. Tests the most important exam skill (Q2 every year).`,color:'accent',diff:'Medium'},
          {id:'detective',title:'Error Detective',desc:`${MISTAKES.length} worked solutions with hidden errors. Find wrong df, wrong SE, misinterpreted CIs, non-nested F-tests, and more.`,color:'amber',diff:'Hard'},
          {id:'speed',title:'Speed Round',desc:`60 seconds, ${SPEED_QS.length} possible questions. Rapid-fire concept recall: definitions, rules, formulas, key facts.`,color:'green',diff:'Easy'},
          {id:'assumptions',title:'Assumption Checker',desc:`${ASSUMPTIONS.length} scenarios вҖ” identify violated assumptions. Covers normality, independence, equal variances, expected frequencies, overfitting, multicollinearity.`,color:'violet',diff:'Hard'},
          {id:'output',title:'Output Reader',desc:`${OUTPUTS.length} exam-style outputs вҖ” compute t-stats, RВІ, F-stats, or interpret CIs and p-values. Directly mimics Q3 and Q4.`,color:'red',diff:'Hard'},
          {id:'calc',title:'Calculation Blitz',desc:`90 seconds, ${CALC_QS.length} possible calculations. SE, df, z-scores, RВІ, odds, margins of error, and more under time pressure.`,color:'accent',diff:'Medium'},
          {id:'exam',title:'Exam Simulator',desc:`20 mixed questions from ALL categories вҖ” test selection, error detection, assumptions, output reading, and concepts. The closest thing to the real exam.`,color:'red',diff:'Exam'}
        ].map(g=>(
          <div className={`card stripe-${g.color}`} key={g.id} style={{cursor:'pointer'}} onClick={()=>startGame(g.id)}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <h3 style={{flex:1}}>{g.title}</h3>
              <span style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:10,background:g.diff==='Easy'?'var(--green-dim)':g.diff==='Medium'?'var(--amber-dim)':g.diff==='Exam'?'var(--violet-dim)':'var(--red-dim)',color:g.diff==='Easy'?'var(--green-text)':g.diff==='Medium'?'var(--amber-text)':g.diff==='Exam'?'var(--violet)':'var(--red-text)'}}>{g.diff}</span>
            </div>
            <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.6,margin:'6px 0'}}>{g.desc}</p>
            <button className="btn btn-primary" style={{marginTop:6}} onClick={e=>{e.stopPropagation();startGame(g.id);}}>Play</button>
          </div>
        ))}
      </div>
    );

    const item = gItems[gIdx];
    const timedMode = gameMode==='speed'||gameMode==='calc';
    const isOver = timedMode?(!gRunning&&gHistory.length>0):gIdx>=gItems.length-1&&gAns!==null;
    const totalQ = timedMode?gHistory.length:gItems.length;
    const gameTitles = {selector:'Test Selector',detective:'Error Detective',speed:'Speed Round',assumptions:'Assumption Checker',output:'Output Reader',calc:'Calculation Blitz',exam:'Exam Simulator'};

    if(isOver && (timedMode||gAns!==null)) return(
      <div className="fade-up">
        <h2>{gameTitles[gameMode]||gameMode} вҖ” Results</h2>
        <div className="game-score">
          <div className="game-score-item"><div className="game-score-val" style={{color:'var(--green-text)'}}>{gScore}</div><div className="game-score-lbl">Correct</div></div>
          <div className="game-score-item"><div className="game-score-val" style={{color:'var(--text)'}}>{totalQ}</div><div className="game-score-lbl">Total</div></div>
          <div className="game-score-item"><div className="game-score-val" style={{color:'var(--accent-text)'}}>{totalQ>0?Math.round(gScore/totalQ*100):0}%</div><div className="game-score-lbl">Accuracy</div></div>
          <div className="game-score-item"><div className="game-score-val" style={{color:'var(--amber-text)'}}>{gBest}</div><div className="game-score-lbl">Best Streak</div></div>
        </div>
        <div className="game-progress" style={{marginBottom:16}}>
          {gHistory.map((ok,i)=><div key={i} className={`game-dot ${ok?'done':'wrong-dot'}`}/>)}
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:8}}>
          <button className="btn btn-primary" onClick={()=>startGame(gameMode)}>Play Again</button>
          <button className="btn" onClick={()=>setGameMode(null)}>Back to Games</button>
        </div>
      </div>
    );

    // Active game
    return(
      <div className="fade-up">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <button className="btn btn-sm" onClick={()=>setGameMode(null)}>Back</button>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            {timedMode&&<div className={`game-timer ${gTimer<=10?'danger':gTimer<=20?'warn':''}`}>{gTimer}s</div>}
            <span style={{fontSize:12,color:'var(--text-muted)'}}>
              {!timedMode&&`${gIdx+1}/${gItems.length}`}
            </span>
            {gStreak>=2&&<span className="game-streak" style={{background:'var(--amber-dim)',color:'var(--amber-text)'}}>{gStreak} streak</span>}
          </div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--green-text)'}}>{gScore} pts</div>
        </div>
        <div className="game-progress" style={{marginBottom:12}}>
          {gItems.map((_,i)=><div key={i} className={`game-dot ${i<gHistory.length?(gHistory[i]?'done':'wrong-dot'):i===gIdx?'current':''}`}/>)}
        </div>

        {gameMode==='selector'&&(
          <div className="card">
            <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>What statistical test should be used?</p>
            <h4 style={{color:'var(--text)',lineHeight:1.6,marginBottom:12}}>{item.q}</h4>
            {item.opts.map((o,oi)=>{
              let cls='game-opt';
              if(gAns!==null){if(o===item.ans)cls+=' correct';else if(oi===gAns&&o!==item.ans)cls+=' wrong';}
              return <button key={oi} className={cls} disabled={gAns!==null} onClick={()=>handleGameAnswer(oi)}>{o}</button>;
            })}
            {gAns!==null&&<div className={`quiz-fb ${item.opts[gAns]===item.ans?'right':'bad'}`} style={{marginTop:10}}>
              <strong>{item.opts[gAns]===item.ans?'Correct':'Incorrect'}</strong>
              <p style={{margin:'4px 0 0',fontSize:12}}>{item.why}</p>
            </div>}
            {gAns!==null&&<button className="btn btn-primary" style={{marginTop:10}} onClick={nextGameQ}>{gIdx<gItems.length-1?'Next':'See Results'}</button>}
          </div>
        )}

        {gameMode==='detective'&&(
          <div className="card">
            <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>Find the mistake in this solution:</p>
            <div style={{background:'var(--bg-overlay)',padding:12,borderRadius:6,marginBottom:12,fontSize:13,lineHeight:1.7,color:'var(--text)',border:'1px solid var(--border)'}}>
              {item.problem}
            </div>
            <p style={{fontSize:12,fontWeight:500,color:'var(--text)',marginBottom:8}}>What went wrong?</p>
            {item.opts.map((o,oi)=>{
              let cls='game-opt';
              if(gAns!==null){if(oi===item.ans)cls+=' correct';else if(oi===gAns&&oi!==item.ans)cls+=' wrong';}
              return <button key={oi} className={cls} disabled={gAns!==null} onClick={()=>handleGameAnswer(oi)}>{o}</button>;
            })}
            {gAns!==null&&<div className={`quiz-fb ${gAns===item.ans?'right':'bad'}`} style={{marginTop:10}}>
              <strong>{gAns===item.ans?'Correct':'Incorrect'}</strong>
              <p style={{margin:'4px 0 0',fontSize:12}}><strong>The error:</strong> {item.error}</p>
              <p style={{margin:'4px 0 0',fontSize:12}}>{item.explain}</p>
            </div>}
            {gAns!==null&&<button className="btn btn-primary" style={{marginTop:10}} onClick={nextGameQ}>{gIdx<gItems.length-1?'Next':'See Results'}</button>}
          </div>
        )}

        {gameMode==='speed'&&gRunning&&(
          <div className="card">
            <h4 style={{color:'var(--text)',lineHeight:1.6,marginBottom:10}}>{item.q}</h4>
            {item.opts.map((o,oi)=>{
              let cls='game-opt';
              if(gAns!==null){if(oi===item.ans)cls+=' correct';else if(oi===gAns&&oi!==item.ans)cls+=' wrong';}
              return <button key={oi} className={cls} disabled={gAns!==null} onClick={()=>handleGameAnswer(oi)}>{o}</button>;
            })}
          </div>
        )}

        {gameMode==='assumptions'&&(
          <div className="card">
            <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>Which assumption is violated?</p>
            <div style={{background:'var(--bg-overlay)',padding:12,borderRadius:6,marginBottom:12,fontSize:13,lineHeight:1.7,color:'var(--text)',border:'1px solid var(--border)'}}>
              {item.setup}
            </div>
            {item.opts.map((o,oi)=>{
              let cls='game-opt';
              if(gAns!==null){if(oi===item.ans)cls+=' correct';else if(oi===gAns&&oi!==item.ans)cls+=' wrong';}
              return <button key={oi} className={cls} disabled={gAns!==null} onClick={()=>handleGameAnswer(oi)}>{o}</button>;
            })}
            {gAns!==null&&<div className={`quiz-fb ${gAns===item.ans?'right':'bad'}`} style={{marginTop:10}}>
              <strong>{gAns===item.ans?'Correct':'Incorrect'}</strong>
              <p style={{margin:'4px 0 0',fontSize:12}}><strong>Violation:</strong> {item.violated}</p>
              <p style={{margin:'4px 0 0',fontSize:12}}>{item.explain}</p>
            </div>}
            {gAns!==null&&<button className="btn btn-primary" style={{marginTop:10}} onClick={nextGameQ}>{gIdx<gItems.length-1?'Next':'See Results'}</button>}
          </div>
        )}

        {gameMode==='output'&&(
          <div className="card">
            <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>Read the output and choose the correct answer:</p>
            <div style={{background:'var(--bg-overlay)',padding:12,borderRadius:6,marginBottom:12,fontSize:13,lineHeight:1.7,color:'var(--text)',border:'1px solid var(--border)',fontFamily:"'JetBrains Mono',monospace"}}>
              {item.context}
            </div>
            {item.opts.map((o,oi)=>{
              let cls='game-opt';
              if(gAns!==null){if(oi===item.idx)cls+=' correct';else if(oi===gAns&&oi!==item.idx)cls+=' wrong';}
              return <button key={oi} className={cls} disabled={gAns!==null} onClick={()=>handleGameAnswer(oi)}>{o}</button>;
            })}
            {gAns!==null&&<div className={`quiz-fb ${gAns===item.idx?'right':'bad'}`} style={{marginTop:10}}>
              <strong>{gAns===item.idx?'Correct':'Incorrect'}</strong>
              <p style={{margin:'4px 0 0',fontSize:12}}>{item.explain}</p>
            </div>}
            {gAns!==null&&<button className="btn btn-primary" style={{marginTop:10}} onClick={nextGameQ}>{gIdx<gItems.length-1?'Next':'See Results'}</button>}
          </div>
        )}

        {gameMode==='calc'&&gRunning&&(
          <div className="card">
            <div style={{background:'var(--bg-overlay)',padding:12,borderRadius:6,marginBottom:12,fontSize:14,lineHeight:1.7,color:'var(--text)',border:'1px solid var(--border)',fontFamily:"'JetBrains Mono',monospace"}}>
              {item.q}
            </div>
            {item.opts.map((o,oi)=>{
              let cls='game-opt';
              if(gAns!==null){if(oi===item.ans)cls+=' correct';else if(oi===gAns&&oi!==item.ans)cls+=' wrong';}
              return <button key={oi} className={cls} disabled={gAns!==null} onClick={()=>handleGameAnswer(oi)}>{o}</button>;
            })}
          </div>
        )}

        {gameMode==='exam'&&(
          <div className="card">
            <span style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:10,background:'var(--accent-dim)',color:'var(--accent-text)',marginBottom:8,display:'inline-block'}}>
              {item._type==='selector'?'Test Selection':item._type==='detective'?'Error Detection':item._type==='assumptions'?'Assumptions':item._type==='output'?'Output Reading':'Concepts'}
            </span>
            {/* Render based on _type */}
            {item._type==='selector'&&(<>
              <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>What statistical test should be used?</p>
              <h4 style={{color:'var(--text)',lineHeight:1.6,marginBottom:12}}>{item.q}</h4>
            </>)}
            {item._type==='detective'&&(<>
              <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>Find the mistake:</p>
              <div style={{background:'var(--bg-overlay)',padding:12,borderRadius:6,marginBottom:12,fontSize:13,lineHeight:1.7,border:'1px solid var(--border)'}}>{item.problem}</div>
            </>)}
            {item._type==='assumptions'&&(<>
              <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>Which assumption is violated?</p>
              <div style={{background:'var(--bg-overlay)',padding:12,borderRadius:6,marginBottom:12,fontSize:13,lineHeight:1.7,border:'1px solid var(--border)'}}>{item.setup}</div>
            </>)}
            {item._type==='output'&&(<>
              <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>Interpret the output:</p>
              <div style={{background:'var(--bg-overlay)',padding:12,borderRadius:6,marginBottom:12,fontSize:13,lineHeight:1.7,border:'1px solid var(--border)',fontFamily:"'JetBrains Mono',monospace"}}>{item.context}</div>
            </>)}
            {item._type==='speed'&&(
              <h4 style={{color:'var(--text)',lineHeight:1.6,marginBottom:12}}>{item.q}</h4>
            )}
            {item.opts.map((o,oi)=>{
              let cls='game-opt';
              const correctIdx = item._type==='output'?item.idx:item._type==='selector'?(item.opts.indexOf(item.ans)):item.ans;
              if(gAns!==null){if(oi===correctIdx)cls+=' correct';else if(oi===gAns&&oi!==correctIdx)cls+=' wrong';}
              return <button key={oi} className={cls} disabled={gAns!==null} onClick={()=>handleGameAnswer(oi)}>{o}</button>;
            })}
            {gAns!==null&&(()=>{
              const correctIdx = item._type==='output'?item.idx:item._type==='selector'?(item.opts.indexOf(item.ans)):item.ans;
              const wasRight = gAns===correctIdx;
              const explanation = item.why||item.explain||item.violated||'';
              return <div className={`quiz-fb ${wasRight?'right':'bad'}`} style={{marginTop:10}}>
                <strong>{wasRight?'Correct':'Incorrect'}</strong>
                {explanation&&<p style={{margin:'4px 0 0',fontSize:12}}>{explanation}</p>}
              </div>;
            })()}
            {gAns!==null&&<button className="btn btn-primary" style={{marginTop:10}} onClick={nextGameQ}>{gIdx<gItems.length-1?'Next':'See Results'}</button>}
          </div>
        )}
      </div>
    );
  };

  const renderQuiz = () => (
    <div className="fade-up">
      <h2>Practice Questions</h2>
      <p className="subtitle">Exam-style, from all 3 past papers</p>
      <div className="tab-row">
        <button className={`tab-btn ${qF==='all'?'active':''}`} onClick={()=>setQF('all')}>All ({QUIZZES.length})</button>
        {TOPICS.map(t=>{const c=QUIZZES.filter(q=>q.topic===t.id).length;return c?<button key={t.id} className={`tab-btn ${qF===t.id?'active':''}`} onClick={()=>setQF(t.id)}>{t.title.split(' ')[0]} ({c})</button>:null;})}
      </div>
      {done>0&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,fontSize:12,color:'var(--text-muted)'}}>
        <span>{right}/{done} ({Math.round(right/done*100)}%)</span>
        <button className="btn btn-sm" onClick={()=>setAnswers({})}>Reset</button>
      </div>}
      {filtQ.map(q=>{const a=answers[q.id];return(
        <div className="card" key={q.id}>
          <div style={{display:'flex',gap:5,marginBottom:6}}><span className="badge">Q{q.id}</span><span className="badge badge-hl">{TOPICS.find(t=>t.id===q.topic)?.title}</span></div>
          <h4 style={{lineHeight:1.6,marginBottom:8,color:'var(--text)'}}>{q.q}</h4>
          {q.opts.map((o,oi)=>{let c='quiz-opt';if(a!==undefined){if(oi===q.ans)c+=' correct';else if(oi===a.sel&&!a.ok)c+=' wrong';}
            return <button key={oi} className={c} disabled={a!==undefined} onClick={()=>setAnswers(p=>({...p,[q.id]:{sel:oi,ok:oi===q.ans}}))}><strong style={{marginRight:5}}>{String.fromCharCode(65+oi)}.</strong>{o}</button>;})}
          {a!==undefined&&<div className={`quiz-fb ${a.ok?'right':'bad'}`}><strong>{a.ok?'Correct':'Incorrect'}</strong><p style={{margin:'4px 0 0',fontSize:12}}>{q.why}</p></div>}
        </div>
      );})}
    </div>
  );

  const renderFC = () => {const c=CARDS[fcIdx];return(
    <div className="fade-up">
      <h2>Flashcards</h2>
      <p className="subtitle">{CARDS.length} cards. Click to flip.</p>
      <div style={{textAlign:'center',fontSize:11,color:'var(--text-muted)',margin:'6px 0'}}>{fcIdx+1} / {CARDS.length}</div>
      <div className="fc-box" onClick={()=>setFcFlip(!fcFlip)} style={{marginBottom:16}}>
        <div className="fc-label">{fcFlip?'Answer':'Question'}</div>
        <div className="fc-text" style={{color:fcFlip?'var(--green-text)':'var(--text)'}}>{fcFlip?c.b:c.f}</div>
        <div className="fc-hint">{fcFlip?'Click for question':'Click to reveal'}</div>
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:8}}>
        <button className="btn" onClick={()=>{setFcIdx(p=>p===0?CARDS.length-1:p-1);setFcFlip(false);}}>Previous</button>
        <button className="btn btn-primary" onClick={()=>{setFcIdx(p=>(p+1)%CARDS.length);setFcFlip(false);}}>Next</button>
      </div>
      <div style={{marginTop:24}}><h3>All cards</h3>
        {CARDS.map((fc,i)=><div key={i} className="card" style={{cursor:'pointer',padding:10}} onClick={()=>{setFcIdx(i);setFcFlip(false);window.scrollTo(0,0);}}><p style={{margin:0,fontSize:12,color:'var(--text-secondary)'}}>{fc.f}</p></div>)}
      </div>
    </div>
  );};

  const getYTId = url => {const m=url.match(/[?&]v=([^&]+)/);return m?m[1]:null;};

  const openVid = (url) => {
    window.open(url, '_blank', 'noopener,noreferrer');
  };

  const renderVideos = () => (
    <div className="fade-up">
      <h2>Video Library</h2>
      <p className="subtitle">Curated YouTube tutorials for each topic вҖ” click any video to watch</p>
      {VIDEOS.map((sec,si)=>(
        <div className="card" key={si}>
          <h3>{sec.title}</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))',gap:10,marginTop:6}}>
          {sec.vids.map((v,vi)=>{
            const vid=getYTId(v.url);
            return(
              <div key={vi} className="video-thumb" onClick={()=>openVid(v.url)} style={{margin:0}}>
                <img className="video-thumb-img" src={`https://img.youtube.com/vi/${vid}/mqdefault.jpg`} alt={v.t} loading="lazy"
                  onError={e=>{e.target.style.background='var(--bg-subtle)';e.target.style.opacity='0.3';}}/>
                <div className="video-play-overlay"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>
                <div className="video-info">
                  <div className="video-info-title">{v.t}</div>
                  <div className="video-info-ch">{v.ch}</div>
                </div>
              </div>
            );
          })}
          </div>
        </div>
      ))}
    </div>
  );

  const renderStory = () => (
    <div className="fade-up">
      <h2>The Big Picture</h2>
      <p className="subtitle">A connected narrative of why every topic matters and how they fit together</p>
      <div className="callout callout-blue" style={{marginBottom:16}}>
        <span className="callout-tag">Why this matters</span> Read this once before diving into individual topics. Understanding the story makes the formulas and tests click into place.
      </div>
      {STORY_SECTIONS.map((sec,si)=>(
        <div className={`card ${stripes[si%5]}`} key={si} style={{marginBottom:14}}>
          <h3 style={{marginBottom:8,color:'var(--text)'}}>{sec.title}</h3>
          {sec.body.split('\n\n').map((para,pi)=>(
            <p key={pi} style={{fontSize:13,lineHeight:1.75,color:'var(--text-secondary)',marginBottom:10}}>{para}</p>
          ))}
        </div>
      ))}
    </div>
  );

  const renderPage = () => {
    if(page==='dashboard')return renderDash();
    if(page==='test-selector')return renderTS();
    if(page==='formulas')return renderFormulas();
    if(page==='quiz')return renderQuiz();
    if(page==='flashcards')return renderFC();
    if(page==='videos')return renderVideos();
    if(page==='big-picture')return renderStory();
    if(page==='games')return renderGames();
    const t=TOPICS.find(t=>t.id===page);
    return t?renderTopic(t):renderDash();
  };

  const cur=navs.find(n=>typeof n==='object'&&n.id===page);

  return(
    <div className="layout">
      <div className={`sidebar ${sideOpen?'open':''}`}>
        <div className="sidebar-brand"><h1>STAT 2526</h1><span>Leiden University</span><span style={{fontSize:9,color:'var(--text-muted)',opacity:0.5,marginTop:4}}>by Karim Jebara</span></div>
        {navs.map((n,i)=>{
          if(n==='_learn')return<div className="nav-group" key={i}><div className="nav-group-label">Learn</div></div>;
          if(n==='_understand')return<div className="nav-group" key={i}><div className="nav-group-label">Understand</div></div>;
          if(n==='_practice')return<div className="nav-group" key={i}><div className="nav-group-label">Practice</div></div>;
          return<div style={{padding:'0 10px'}} key={n.id}><button className={`nav-btn ${page===n.id?'active':''}`} onClick={()=>go(n.id)}><Icon name={n.icon} size={15}/><span>{n.label}</span></button></div>;
        })}
        <div className="sidebar-footer">
          <div className="progress-text"><span>Quiz</span><span>{done}/{QUIZZES.length}</span></div>
          <div className="progress-track"><div className="progress-track-fill" style={{width:`${done/QUIZZES.length*100}%`}}/></div>
        </div>
      </div>
      <div className="main-area">
        <div className="topbar">
          <button className="menu-toggle" onClick={()=>setSideOpen(!sideOpen)}><Icon name="menu" size={14}/></button>
          <span className="topbar-title">{cur?.label||'Dashboard'}</span>
        </div>
        <div className="content-wrap">{renderPage()}<div style={{height:40}}/></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
