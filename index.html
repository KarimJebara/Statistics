<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAT 2526 вҖ” Study Guide</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#111113;--bg-raised:#19191d;--bg-overlay:#222228;--bg-subtle:#2a2a32;
  --border:#2e2e38;--border-light:#38384a;
  --text:#e0e0e6;--text-secondary:#9898a8;--text-muted:#6a6a7a;
  --accent:#5b8def;--accent-dim:rgba(91,141,239,0.12);--accent-text:#7da8f5;
  --green:#34d399;--green-dim:rgba(52,211,153,0.10);--green-text:#5ee8b5;
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.10);--amber-text:#fbbf24;
  --red:#f87171;--red-dim:rgba(248,113,113,0.10);--red-text:#fca5a5;
  --violet:#a78bfa;--violet-dim:rgba(167,139,250,0.10);
  --radius:8px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.65;font-size:14px;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--bg-subtle);border-radius:3px;}

.layout{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{
  width:250px;min-width:250px;background:var(--bg-raised);border-right:1px solid var(--border);
  position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;
  display:flex;flex-direction:column;transition:transform .25s ease;
}
.sidebar.closed{transform:translateX(-250px);}
@media(max-width:860px){
  .sidebar{transform:translateX(-250px);}
  .sidebar.open{transform:translateX(0);}
  .main-area{margin-left:0!important;}
  .menu-toggle{display:flex!important;}
  .content-wrap{padding:20px 16px!important;}
}
.sidebar-brand{padding:18px 18px 14px;border-bottom:1px solid var(--border);}
.sidebar-brand h1{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.02em;}
.sidebar-brand span{font-size:11px;color:var(--text-muted);display:block;margin-top:2px;}

.nav-group{padding:10px 10px 2px;}
.nav-group-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:0 8px 4px;}
.nav-btn{
  display:flex;align-items:center;gap:9px;width:100%;padding:6px 10px;
  border:none;background:none;border-radius:6px;cursor:pointer;
  font:inherit;font-size:13px;color:var(--text-secondary);text-align:left;
  transition:background .1s,color .1s;
}
.nav-btn:hover{background:var(--bg-overlay);color:var(--text);}
.nav-btn.active{background:var(--accent-dim);color:var(--accent-text);font-weight:500;}
.nav-btn .ico{width:16px;height:16px;flex-shrink:0;opacity:.5;}
.nav-btn.active .ico{opacity:.9;}

.sidebar-footer{padding:12px 18px;border-top:1px solid var(--border);margin-top:auto;}
.progress-track{height:3px;background:var(--bg-subtle);border-radius:2px;overflow:hidden;}
.progress-track-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.progress-text{font-size:10px;color:var(--text-muted);margin-bottom:4px;display:flex;justify-content:space-between;}

/* Main */
.main-area{margin-left:250px;min-height:100vh;transition:margin-left .25s;}
.topbar{
  position:sticky;top:0;z-index:50;background:rgba(17,17,19,.82);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  padding:10px 28px;display:flex;align-items:center;gap:12px;
}
.menu-toggle{
  display:none;align-items:center;justify-content:center;
  width:30px;height:30px;border:1px solid var(--border);border-radius:6px;
  background:var(--bg-raised);cursor:pointer;color:var(--text-secondary);
}
.topbar-title{font-size:13px;font-weight:600;color:var(--text-secondary);}
.content-wrap{padding:28px 32px;max-width:800px;margin:0 auto;}

/* Typography */
h2{font-size:21px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-0.02em;}
h2+.subtitle{font-size:13px;color:var(--text-muted);margin-bottom:22px;}
h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;}
h4{font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;}
p{margin-bottom:8px;color:var(--text-secondary);font-size:13px;}

/* Cards */
.card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}

/* Stripes */
.stripe-blue{border-left:2px solid var(--accent);}
.stripe-green{border-left:2px solid var(--green);}
.stripe-amber{border-left:2px solid var(--amber);}
.stripe-red{border-left:2px solid var(--red);}
.stripe-violet{border-left:2px solid var(--violet);}

/* ====== FORMULA BLOCKS ====== */
.math-block{
  background:var(--bg-overlay);border:1px solid var(--border-light);
  border-radius:6px;padding:16px 20px;margin:12px 0;overflow-x:auto;
  text-align:center;
}
.math-block .katex{font-size:1.2em;color:#e8e8f0;}
.math-block .katex .mathnormal,
.math-block .katex .mathit{color:#c4d4f5;}
.math-label{
  font-size:12px;font-weight:600;color:var(--accent-text);
  margin-bottom:8px;text-align:left;
}
.math-note{font-size:12px;color:var(--text-muted);margin-top:10px;line-height:1.5;text-align:left;}

/* Override KaTeX colors for dark mode */
.katex{color:#d8d8e8;}
.katex .mord, .katex .mbin, .katex .mrel, .katex .mopen, .katex .mclose,
.katex .mpunct, .katex .minner, .katex .mop{color:#d8d8e8;}

/* Inline formula */
.math-inline{display:inline;}
.math-inline .katex{font-size:1em;}

/* Callout boxes */
.callout{border-radius:6px;padding:10px 12px;margin:10px 0;font-size:12px;line-height:1.6;border:1px solid;}
.callout-blue{background:var(--accent-dim);border-color:rgba(91,141,239,0.2);color:var(--accent-text);}
.callout-green{background:var(--green-dim);border-color:rgba(52,211,153,0.2);color:var(--green-text);}
.callout-amber{background:var(--amber-dim);border-color:rgba(245,158,11,0.2);color:var(--amber-text);}
.callout-red{background:var(--red-dim);border-color:rgba(248,113,113,0.2);color:var(--red-text);}

.callout-tag{font-weight:700;margin-right:4px;text-transform:uppercase;font-size:10px;letter-spacing:.05em;}

/* Key points */
.key-list{list-style:none;padding:0;margin:6px 0;}
.key-list li{padding:3px 0 3px 18px;position:relative;font-size:12px;color:var(--text-secondary);line-height:1.6;}
.key-list li::before{content:"";position:absolute;left:3px;top:10px;width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.6;}

/* Subtopics */
.subtopic{background:var(--bg-overlay);border:1px solid var(--border);border-radius:6px;padding:12px;margin:6px 0;}
.subtopic-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;}
.subtopic p{font-size:12px;margin:0;color:var(--text-secondary);}
.subtopic .detail{color:var(--green-text);font-size:11px;margin-top:3px;}

/* Steps */
.step-list{list-style:none;padding:0;}
.step-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.step-item:last-child{border-bottom:none;}
.step-num{
  width:24px;height:24px;flex-shrink:0;border-radius:50%;
  background:var(--accent);color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;margin-top:1px;
}
.step-body h4{margin-bottom:1px;color:var(--text);}
.step-body p{margin:0;font-size:12px;}

/* Tables */
.table-wrap{overflow-x:auto;margin:10px 0;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--bg-overlay);font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border-light);color:var(--text);}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary);}
tr:hover td{background:var(--bg-overlay);}
td.hl{color:var(--accent-text);font-weight:500;}

/* Quiz */
.quiz-opt{
  display:block;width:100%;text-align:left;background:var(--bg-overlay);
  border:1px solid var(--border);border-radius:6px;padding:9px 12px;
  margin:4px 0;cursor:pointer;font:inherit;font-size:13px;color:var(--text);
  transition:border-color .1s,background .1s;
}
.quiz-opt:hover{border-color:var(--accent);background:var(--accent-dim);}
.quiz-opt.correct{border-color:var(--green);background:var(--green-dim);}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-dim);}
.quiz-opt:disabled{cursor:default;}
.quiz-opt:disabled:hover{border-color:var(--border);background:var(--bg-overlay);}
.quiz-opt.correct:disabled:hover{border-color:var(--green);background:var(--green-dim);}
.quiz-opt.wrong:disabled:hover{border-color:var(--red);background:var(--red-dim);}

.quiz-fb{padding:10px 12px;border-radius:6px;margin-top:8px;font-size:12px;line-height:1.6;}
.quiz-fb.right{background:var(--green-dim);border:1px solid rgba(52,211,153,0.2);color:var(--green-text);}
.quiz-fb.bad{background:var(--red-dim);border:1px solid rgba(248,113,113,0.2);color:var(--red-text);}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg-overlay);color:var(--text-secondary);
  font:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .1s;
}
.btn:hover{background:var(--bg-subtle);color:var(--text);border-color:var(--border-light);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#4a7de0;border-color:#4a7de0;}
.btn-sm{padding:3px 8px;font-size:11px;}

/* Tabs */
.tab-row{display:flex;gap:1px;margin-bottom:14px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab-btn{
  padding:5px 10px;font:inherit;font-size:11px;font-weight:500;
  border:none;background:none;color:var(--text-muted);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s;
}
.tab-btn:hover{color:var(--text-secondary);}
.tab-btn.active{color:var(--accent-text);border-bottom-color:var(--accent);}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr;}}

/* Stat cards */
.stat-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
.stat-val{font-size:26px;font-weight:700;color:var(--text);}
.stat-lbl{font-size:10px;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}

/* Flashcard */
.fc-box{
  background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius);
  padding:36px 28px;text-align:center;cursor:pointer;min-height:200px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:border-color .15s;user-select:none;
}
.fc-box:hover{border-color:var(--accent);}
.fc-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:12px;}
.fc-text{font-size:16px;color:var(--text);line-height:1.7;}
.fc-hint{font-size:10px;color:var(--text-muted);margin-top:14px;}

/* Collapse */
.collapse-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:2px 0;}
.collapse-arrow{color:var(--text-muted);font-size:9px;transition:transform .15s;}
.collapse-arrow.open{transform:rotate(90deg);}

/* Badge */
.badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;background:var(--bg-subtle);color:var(--text-muted);}
.badge-hl{background:var(--accent-dim);color:var(--accent-text);}

@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .18s ease;}

/* Formula row layout: formula left, symbols right */
.formula-row{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;background:var(--bg-raised);}
.formula-row-left{padding:14px 16px;display:flex;flex-direction:column;justify-content:center;}
.formula-row-right{padding:12px 14px;background:var(--bg-overlay);border-left:1px solid var(--border);font-size:11px;}
.formula-row-right .sym-row{display:flex;align-items:baseline;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.formula-row-right .sym-row:last-child{border-bottom:none;}
.formula-row-right .sym-k{min-width:32px;color:var(--accent-text);font-size:13px;flex-shrink:0;}
.formula-row-right .sym-eq{color:var(--text-muted);margin:0 2px;}
.formula-row-right .sym-desc{color:var(--text-secondary);}
.formula-row-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);margin-bottom:6px;}
.formula-row-note{font-size:11px;color:var(--text-muted);margin-top:8px;line-height:1.5;}
@media(max-width:700px){
  .formula-row{grid-template-columns:1fr;}
  .formula-row-right{border-left:none;border-top:1px solid var(--border);}
}

/* Game styles */
.game-timer{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent-text);text-align:center;}
.game-timer.warn{color:var(--amber-text);}
.game-timer.danger{color:var(--red-text);}
.game-score{display:flex;justify-content:center;gap:20px;margin:10px 0;}
.game-score-item{text-align:center;}
.game-score-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.game-score-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
.game-opt{display:block;width:100%;text-align:left;padding:12px 14px;margin:5px 0;border-radius:6px;background:var(--bg-overlay);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:13px;line-height:1.5;transition:border-color .1s,background .1s;}
.game-opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-dim);}
.game-opt.correct{border-color:var(--green);background:var(--green-dim);color:var(--green-text);}
.game-opt.wrong{border-color:var(--red);background:var(--red-dim);color:var(--red-text);}
.game-opt:disabled{cursor:default;opacity:0.85;}
.game-streak{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.game-progress{display:flex;gap:3px;justify-content:center;margin:8px 0;}
.game-dot{width:8px;height:8px;border-radius:50%;background:var(--bg-subtle);}
.game-dot.done{background:var(--green);}
.game-dot.wrong-dot{background:var(--red);}
.game-dot.current{background:var(--accent);box-shadow:0 0 6px var(--accent);}

/* Video embed */
.video-embed{position:relative;width:100%;padding-bottom:56.25%;margin:8px 0 12px;border-radius:6px;overflow:hidden;background:#000;}
.video-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.video-thumb{position:relative;cursor:pointer;border-radius:6px;overflow:hidden;margin:6px 0 10px;background:var(--bg-overlay);border:1px solid var(--border);transition:border-color .15s;}
.video-thumb:hover{border-color:var(--accent);}
.video-thumb-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;opacity:0.85;transition:opacity .15s;}
.video-thumb:hover .video-thumb-img{opacity:1;}
.video-play-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;height:52px;background:rgba(0,0,0,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.video-play-overlay svg{fill:#fff;width:22px;height:22px;margin-left:3px;}
.video-info{padding:8px 10px;}
.video-info-title{font-size:13px;font-weight:500;color:var(--text);}
.video-info-ch{font-size:11px;color:var(--text-muted);margin-top:2px;}
</style>
</head>

<div id="root"></div>

    book:"M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"

};

// ===== KATEX RENDERING =====
const K = ({tex, display=false}) => {
  const ref = useRef(null);
  useEffect(() => {
    if(ref.current && window.katex){
      try{window.katex.render(tex, ref.current, {displayMode:display, throwOnError:false, trust:true});}
      catch(e){ref.current.textContent=tex;}
    }
  }, [tex,display]);
  return <span ref={ref}/>;
};

const MathBlock = ({label, tex, note}) => (

const TOPICS = [
  {
    id:'descriptive', title:'Descriptive Statistics', icon:'chart',
    sections:[
      {title:'What Are Descriptive Statistics?',body:'Descriptive statistics are the FIRST step in any analysis. Before you can test anything or draw conclusions, you need to understand what your data looks like. Think of it like looking at a map before driving вҖ” you need to see the lay of the land. Descriptive stats answer "what do we have?" while inferential stats (which come later) answer "what can we conclude?"',keys:['They describe the data you HAVE вҖ” they never make claims about a larger population','Two main goals: find the CENTER (typical value) and the SPREAD (how much variation)','Why this matters: a mean of 50 with SD of 2 is very different from a mean of 50 with SD of 30, even though the center is the same','Always visualize before calculating вҖ” plots reveal patterns that numbers alone can miss','On the exam: you need to know which statistics are appropriate for which measurement scales']},
      {title:'Variables and Measurement Scales',body:'This is one of the most fundamental concepts. Every variable has a measurement scale, and the scale determines EVERYTHING: which statistics you can calculate, which plots to use, and which tests to run later. Getting the scale wrong means choosing the wrong test on the exam.',subs:[
        {name:'Nominal',desc:'Just categories, no inherent order. Examples: app category (Games, Health, Social), console type (Xbox, PC, PlayStation), programming language, country. You cannot rank them вҖ” saying "Games > Health" makes no sense.',detail:'Statistics: only mode and frequencies/proportions. You CANNOT calculate a mean or median. Visualize with bar charts or pie charts. Tests: chi-square test.'},
        {name:'Ordinal',desc:'Categories WITH a meaningful order, but the distances between categories are NOT necessarily equal. Examples: education level (high school < bachelor < master < PhD), star ratings (1-5), age categories (everyone, 10+, 12+, 18+). The order matters but the "gaps" are unequal.',detail:'Statistics: mode and median (but NOT mean, because distances aren\'t equal). Example: you can say "more people gave 5 stars than 1 star" but you can\'t say "the average rating is 3.7" вҖ” technically the distances aren\'t equal.'},
        {name:'Interval',desc:'Numeric with equal distances between values, but NO true zero. The key: zero doesn\'t mean "nothing." Example: temperature in Celsius вҖ” 0В°C doesn\'t mean "no temperature." Year вҖ” year 0 is arbitrary. IQ scores.',detail:'Statistics: mean, median, mode, SD, all valid. But you CANNOT say "40В°C is twice as hot as 20В°C" because the zero is arbitrary. When in doubt between interval and ratio, ask: does zero mean "none"?'},
        {name:'Ratio',desc:'Numeric with equal distances AND a meaningful zero. Zero means "nothing." Examples: weight (0 kg = no weight), price (вӮ¬0 = free), height, number of downloads, age in years, distance. This is the most "complete" scale.',detail:'All statistics valid, plus you can form meaningful ratios: "200 downloads is twice as many as 100." On the exam: most quantitative variables are ratio. App size in MB, number of viewers, body mass in grams вҖ” all ratio.'}
      ]},
      {title:'Measures of Center',body:'These answer "what is the typical value?" Each has strengths and weaknesses, and the right choice depends on the data.',formulas:[
        {label:'Mean (average)',tex:'\\bar{x} = \\frac{\\displaystyle\\sum_{i=1}^{n} x_i}{n}',note:'Sum all values, divide by count. The "balance point" of the data. Very sensitive to outliers вҖ” one billionaire in a room of students will massively skew the mean income upward. Use for roughly symmetric data without extreme outliers.'},
        {label:'Median',tex:'\\widetilde{x} = \\text{middle value of sorted data}',note:'Sort values, take the middle one (or average the two middle if n is even). Resistant to outliers вҖ” that billionaire barely moves the median. Better than mean for skewed data like income, house prices, app downloads.'},
        {label:'Mode',tex:'\\text{Mo} = \\text{most frequent value}',note:'The only measure of center that works for nominal data. "The most common app category is Games." Can have multiple modes (bimodal/multimodal data). Less useful for continuous data.'}
      ]},
      {title:'Measures of Spread',body:'Two datasets can have the same mean but look completely different. Spread tells you how much the values vary around the center. This is crucial вҖ” statistics is fundamentally about understanding VARIATION.',formulas:[
        {label:'Range',tex:'\\text{Range} = x_{\\max} - x_{\\min}',note:'Simple but terrible вҖ” just two extreme values determine it. One outlier ruins it. Almost never used in serious analysis.'},
        {label:'Sample Variance',tex:'s^2 = \\frac{\\displaystyle\\sum_{i=1}^{n}(x_i - \\bar{x})^2}{n-1}',note:'Average squared distance from the mean. Why squared? So negatives don\'t cancel positives. Why (nвҲ’1) instead of n? This is called Bessel\'s correction вҖ” it corrects for the fact that a sample underestimates the population variance. This is important: ALWAYS nвҲ’1 for samples.'},
        {label:'Sample Standard Deviation',tex:'s = \\sqrt{\\frac{\\displaystyle\\sum_{i=1}^{n}(x_i - \\bar{x})^2}{n-1}}',note:'Square root of variance. Why we prefer SD over variance: it\'s in the SAME UNITS as the data. If data is in kg, SD is in kg (variance would be in kgВІ). SD tells you "on average, values are about s units from the mean."'},
        {label:'Interquartile Range',tex:'\\text{IQR} = Q_3 - Q_1',note:'Range of the middle 50% of data. Q1 = 25th percentile, Q3 = 75th percentile. Resistant to outliers вҖ” the box plot shows the IQR as the box. Often used with the median for skewed data.'}
      ]},
      {title:'Z-scores',body:'A z-score standardizes any value so you can compare across different scales. "Is scoring 85 on a statistics exam better than scoring 72 on a calculus exam?" It depends on the mean and SD of each exam. Z-scores solve this by converting both to a common scale: "how many standard deviations from the mean?"',formulas:[
        {label:'Z-score',tex:'z = \\frac{x - \\bar{x}}{s}',note:'z = 0 вҶ’ exactly at the mean. z = 1 вҶ’ one SD above mean. z = вҲ’2 вҶ’ two SDs below mean. Rule of thumb: |z| > 2 is unusual (only ~5% of data in a normal distribution), |z| > 3 is very unusual (~0.3%). Z-scores are the foundation of ALL hypothesis tests вҖ” every test statistic is essentially a z-score or t-score.'}
      ]},
      {title:'Visualizations',body:'Different data types need different plots. Choosing the wrong plot can be misleading or useless.',keys:[

        'Bar chart вҖ” for categorical/nominal data. Height = frequency or proportion of each category. NOT the same as a histogram (histogram has no gaps, bar chart does).',

  {
    id:'datacollection', title:'Data Collection & Sampling', icon:'target',
    sections:[
      {title:'Why Data Collection Matters',body:'Before ANY analysis, you need DATA вҖ” and HOW you collect it determines EVERYTHING that follows. Bad data = bad conclusions, no matter how sophisticated your test. Think of it this way: if you want to know the average height of Dutch adults and you only measure basketball players, your data is useless. This chapter is about avoiding exactly that kind of mistake. On the exam, Question 1 is ALWAYS about sampling вҖ” describing the method, identifying bias, and calculating sample size.',keys:[
        'The population is the ENTIRE group you want to know about (e.g., all 2 million app users)',
        'The sample is the SUBSET you actually collect data from (e.g., 500 surveyed users)',
        'Parameter вҖ” a number that describes the POPULATION (Ој for mean, ПҖ for proportion). You usually don\'t know this вҖ” it\'s what you\'re trying to estimate.',
        'Statistic вҖ” a number computed from the SAMPLE (xМ„ for mean, ПҖМӮ for proportion). This is what you actually calculate.',
        'Sampling frame вҖ” the list of all units you CAN sample from. If the frame doesn\'t match the population, you have a problem.',
        'The entire goal: your sample should be a MINIATURE VERSION of the population. If it is, your statistics will be close to the parameters.'
      ]},
      {title:'Sampling Methods',body:'There are multiple ways to select a sample. The method matters because it determines whether your sample is representative. The exam will describe a scenario and ask you to identify which method was used.',subs:[
        {name:'Simple Random Sampling (SRS)',desc:'Every unit in the population has an EQUAL probability of being selected. Like putting everyone\'s name in a hat and drawing randomly. This is the gold standard вҖ” all other methods are compared to it.',detail:'When to use: when you have a complete list of the population and can randomly select from it. Pro: completely unbiased, simplest to analyze. Con: requires a complete population list (sampling frame), which is often unavailable. If the population has rare subgroups, SRS might miss them entirely.'},
        {name:'Systematic Sampling',desc:'Pick a random starting point, then select every k-th unit from a list. For example, if you want 100 from 1000, pick a random start between 1-10, then take every 10th person.',detail:'When to use: when you have an ordered list and want something simpler than SRS. Pro: very easy to implement, doesn\'t require random number generation for every selection. Con: if there\'s a hidden pattern in the list that matches your interval, you get biased results. Example: if employees are listed by department in groups of 10, selecting every 10th might always pick the department head.'},
        {name:'Stratified Sampling',desc:'Divide the population into STRATA (non-overlapping groups based on a known characteristic), then take a random sample FROM EACH stratum. Example: divide by country, then randomly sample users from each country.',detail:'When to use: when you want to guarantee representation of all important subgroups. Pro: ensures every group is represented, often more precise than SRS. Con: you must know the strata in advance and be able to classify every unit. KEY DISTINCTION from cluster sampling: you sample FROM ALL strata.'},
        {name:'Cluster Sampling',desc:'Divide the population into CLUSTERS (usually geographic or organizational), randomly select SOME clusters, then survey EVERYONE (or a sample) within the selected clusters.',detail:'When to use: when you don\'t have a complete list of individuals but can identify groups. Example: can\'t list all households in a country, but can list all cities вҖ” pick random cities, survey all households in those cities. Pro: practical and cheap. Con: less precise than SRS or stratified. KEY DISTINCTION from stratified: you select SOME clusters, not all.'},
        {name:'Multistage Sampling',desc:'Combine multiple methods in stages. First cluster, then stratify within clusters, then SRS within strata. Real-world surveys almost always use this.',detail:'Example: Stage 1 вҖ” randomly select 10 provinces (cluster). Stage 2 вҖ” within each province, stratify by urban/rural. Stage 3 вҖ” SRS within each stratum. Pro: flexible and practical. Con: complex to analyze.'}
      ]},
      {title:'Types of Bias',body:'Bias means your sample systematically differs from the population in some way. There are three types, and the exam loves to ask you to identify them. The key word is SYSTEMATIC вҖ” random variation is expected and handled by statistics, but bias cannot be fixed by a larger sample.',subs:[
        {name:'Sampling Bias (Undercoverage)',desc:'Your sampling frame doesn\'t cover the entire population. Some groups are left out or underrepresented. Example: surveying app users via email misses users who didn\'t provide an email address.',detail:'This is about WHO HAS A CHANCE to be in your sample. If certain groups have zero chance, they\'re excluded no matter how large your sample. Fix: make the frame as complete as possible. On the exam: look for "only surveyed X" or "used list of Y" вҖ” if the list doesn\'t match the population, it\'s sampling bias.'},
        {name:'Nonresponse Bias',desc:'People who don\'t respond may differ systematically from those who do. If only 40/350 respond to a survey, those 40 might not represent the 350. Example: satisfied customers might not bother responding, so your sample over-represents unhappy people.',detail:'This is about WHO ACTUALLY RESPONDS. Even with a perfect sampling frame, if certain types of people refuse to participate, your sample is biased. Fix: follow up with non-responders, use incentives (but beware вҖ” incentives like book vouchers can introduce response bias). On exam: when response rate is low, always consider nonresponse bias.'},
        {name:'Response Bias',desc:'People don\'t answer truthfully. This happens with sensitive topics (drug use, income), socially desirable answers (exercise frequency), or leading questions ("Don\'t you agree that...").',detail:'This is about the QUALITY of responses you get. Even if the right people respond, their answers might be wrong. Fix: anonymous surveys, neutral question wording, randomized response techniques. On exam: if a book voucher is offered to get more responses, respondents might rush through вҶ’ response bias.'}
      ]},
      {title:'Observational vs Experimental Studies',body:'This distinction is CRUCIAL because it determines whether you can claim CAUSATION. The exam will describe a study and ask what kind it is and what conclusions you can draw.',subs:[
        {name:'Observational Study',desc:'The researcher OBSERVES subjects as they naturally are. No intervention, no random assignment. Example: comparing app ratings between users who chose the free version vs those who chose premium.',detail:'Limitation: you can ONLY find ASSOCIATIONS, never prove causation. Why? Because there might be confounding variables (lurking variables) you haven\'t measured. Users who chose premium might be wealthier, more tech-savvy, etc. вҖ” you can\'t separate the effect of the app version from these other differences. Simpson\'s Paradox can also occur.'},
        {name:'Experimental Study',desc:'The researcher RANDOMLY ASSIGNS subjects to different conditions (treatments). Example: randomly giving half of users version A and half version B, then comparing satisfaction.',detail:'Why this works: RANDOMIZATION makes the groups approximately equal on ALL variables вҖ” both measured and unmeasured. So any difference in outcome is likely caused by the treatment. This is why experiments CAN demonstrate causation. Keywords: random assignment, treatment, control group, placebo. On exam: "can we conclude X CAUSED Y?" вҖ” only if randomized experiment.'}
      ]},
      {title:'Sample Size Determination',body:'Before collecting data, you often need to decide how many observations to collect. Too few and your estimates are imprecise. Too many and you waste resources. The sample size formula lets you calculate exactly how many you need for a desired margin of error. This appears on every exam.',formulas:[
        {label:'Sample size for proportion',tex:'n = \\pi(1-\\pi) \\cdot \\left(\\frac{z^*}{M}\\right)^{\\!2}',note:'ПҖ = estimated proportion (use 0.5 if unknown вҖ” this gives the MAXIMUM sample size, the conservative choice). z* = critical value for your confidence level (1.96 for 95%, 2.576 for 99%). M = desired margin of error. Example from exam: within 0.67%, 99% confidence, ПҖ вүҲ 0.40 вҶ’ n = 0.4 Г— 0.6 Г— (2.576/0.0067)ВІ вүҲ 35,450.'}
      ]}

      {title:'What Is a Bivariate Relationship?',body:'So far we\'ve looked at one variable at a time. But the really interesting questions are about RELATIONSHIPS between two variables. "Does studying more lead to higher grades?" "Is height related to weight?" "Do vaccinated people get infected less?" This is bivariate analysis вҖ” looking at TWO variables together to see if they\'re related.',keys:[
        'Explanatory variable (x) = the predictor, the "cause" or grouping variable. Sometimes called independent variable.',

      {title:'Categorical Associations',body:'When both variables are categorical, you use a contingency table to see the relationship. The key idea: if the variables are independent (no association), the conditional proportions should be the SAME across groups. If they differ, there\'s an association.',keys:[

      {title:'Correlation',body:'When both variables are quantitative, correlation measures the strength and direction of their LINEAR relationship. It\'s one of the most used and most misunderstood statistics. The correlation coefficient r is always between -1 and +1. It tells you two things: the DIRECTION (positive or negative) and the STRENGTH (how tightly the points cluster around a line).',formulas:[
        {label:'Pearson correlation coefficient',tex:'r = \\frac{\\displaystyle\\sum_{i=1}^{n}(x_i - \\bar{x})(y_i - \\bar{y})}{(n-1) \\cdot s_x \\cdot s_y}',note:'What this formula does: for each point, it asks "is x above/below its mean AND is y above/below its mean?" If they tend to go in the same direction (both above or both below), r is positive. If opposite directions, r is negative. The denominator standardizes so r stays between -1 and +1.'}
      ],keys:[
        'r = +1: perfect positive linear вҖ” all points exactly on an upward line',

        'r = 0: NO linear relationship (but there COULD be a curved one!)',
        '|r| < 0.3: weak. |r| 0.3-0.7: moderate. |r| > 0.7: strong.',
        'Correlation does NOT imply causation вҖ” this is probably the most important thing in the entire course',

        'Outliers can massively distort r вҖ” one extreme point can make a weak relationship look strong or vice versa',

      ]},
      {title:'Simple Linear Regression',body:'While correlation tells you IF there\'s a linear relationship, regression gives you the EQUATION of the line. This lets you PREDICT y from x. The method is called "least squares" because it finds the line that minimizes the sum of squared distances from each point to the line (the residuals). Why squared? So that underpredictions and overpredictions don\'t cancel out.',formulas:[
        {label:'Prediction equation',tex:'\\hat{y} = a + bx',note:'Е· (y-hat) = the PREDICTED value of y. a = intercept (predicted y when x = 0 вҖ” may or may not be meaningful depending on whether x = 0 makes sense). b = slope (for every 1-unit increase in x, the predicted y changes by b units).'},
        {label:'Slope',tex:'b = r \\cdot \\frac{s_y}{s_x}',note:'The slope is the correlation SCALED by the ratio of standard deviations. If r is positive, b is positive. If the variation in y is larger than in x, the slope is steeper.'},
        {label:'Intercept',tex:'a = \\bar{y} - b\\,\\bar{x}',note:'This guarantees the regression line always passes through the point (xМ„, Иі) вҖ” the "center of mass" of the data.'},
        {label:'Residual',tex:'e_i = y_i - \\hat{y}_i',note:'The residual is the vertical distance from an actual point to the predicted line. Positive residual = the model UNDERPREDICTED (actual was higher). Negative = OVERPREDICTED. Good residuals should look random with no pattern.'},
        {label:'Coefficient of determination',tex:'R^2 = 1 - \\frac{SSE}{TSS} = \\frac{TSS - SSE}{TSS}',note:'RВІ is the proportion of variance in y that is EXPLAINED by x. If RВІ = 0.75, the model explains 75% of the variation. The remaining 25% is due to factors not in the model. For simple regression (one predictor), RВІ = rВІ. TSS = total sum of squares (total variation). SSE = sum of squared errors (unexplained variation).'}

      {title:'Simpson\'s Paradox',body:'One of the most fascinating and exam-relevant concepts. Simpson\'s Paradox occurs when a trend that appears in several subgroups REVERSES when the groups are combined. This happens because of a confounding variable вҖ” a lurking variable that influences both x and y.',keys:[
        'Classic example: a university appears to discriminate against women in admissions (lower overall acceptance rate). But looking at each department separately, women are admitted at HIGHER rates. The paradox: women applied more to competitive departments with low acceptance rates.',

    id:'sampling-dist', title:'Sampling Distributions', icon:'dice',
    sections:[
      {title:'Why Sampling Distributions Are the Heart of Statistics',body:'This is arguably the most important concept in the entire course. Everything before this was preparation; everything after this DEPENDS on understanding sampling distributions. Here is the key insight: every time you take a sample and compute a statistic (like xМ„ or ПҖМӮ), you get a NUMBER. But if you took a different sample, you\'d get a slightly different number. The sampling distribution describes ALL the possible values that statistic could take across all possible samples. Understanding this is what makes confidence intervals and hypothesis tests possible.',keys:[
        'NOT the distribution of the raw data вҖ” it\'s the distribution of a STATISTIC computed from many possible samples',
        'If you could take 10,000 different samples of size n and compute xМ„ from each, the histogram of those 10,000 means IS the sampling distribution of xМ„',
        'The center of the sampling distribution equals the population parameter (xМ„ centers on Ој, ПҖМӮ centers on ПҖ) вҖ” this makes sample statistics UNBIASED estimators',
        'The spread of the sampling distribution is called the Standard Error (SE) вҖ” NOT the standard deviation of the data',
        'Larger samples вҶ’ smaller SE вҶ’ the statistic is more precisely estimated. This is why bigger samples are better.',

      {title:'Central Limit Theorem (CLT)',body:'The CLT is the most powerful theorem in statistics. It says: regardless of what the population looks like (skewed, bimodal, uniform, whatever), the sampling distribution of the sample mean xМ„ will be approximately NORMAL (bell-shaped) as long as the sample size is large enough. This is remarkable вҖ” even if the original data is wildly non-normal, the distribution of averages becomes normal. This is WHY we can use normal-distribution-based methods (z-scores, confidence intervals, hypothesis tests) for almost everything.',formulas:[
        {label:'Mean of sampling distribution',tex:'\\mu_{\\bar{x}} = \\mu',note:'The average of all possible sample means equals the true population mean. This is why xМ„ is an unbiased estimator of Ој.'},
        {label:'Standard error of the mean',tex:'SE = \\frac{\\sigma}{\\sqrt{n}}',note:'As n increases, SE DECREASES вҖ” by the square root. Quadrupling n halves the SE. Going from n=25 to n=100 cuts the SE in half. In practice, Пғ is unknown so we use s instead: SE = s/вҲҡn.'}
      ],keys:[
        'Rule of thumb: n вүҘ 30 is "large enough" for the CLT to kick in',

        'The CLT explains why the normal distribution shows up EVERYWHERE in statistics'

      {title:'Sampling Distribution of a Proportion',body:'For categorical data (yes/no, success/failure), we use the sample proportion ПҖМӮ instead of xМ„. The sampling distribution of ПҖМӮ is also approximately normal (by CLT), centered at the true population proportion ПҖ.',formulas:[
        {label:'Mean',tex:'\\mu_{\\hat{\\pi}} = \\pi',note:'The average of all possible sample proportions equals the true population proportion.'},
        {label:'Standard error',tex:'SE = \\sqrt{\\frac{\\pi(1-\\pi)}{n}}',note:'Notice: when ПҖ is close to 0.5, the SE is largest (most uncertainty). When ПҖ is close to 0 or 1, SE is smallest. In practice, ПҖ is unknown so we estimate SE using ПҖМӮ.'}
      ],keys:[
        'Conditions for normal approximation: nПҖ вүҘ 10 AND n(1вҲ’ПҖ) вүҘ 10. These ensure enough successes AND failures for the bell shape to hold.',
        'Example: if ПҖ = 0.70 and n = 50, then nПҖ = 35 вүҘ 10 and n(1вҲ’ПҖ) = 15 вүҘ 10. Both met, normal approximation is fine.',

      {title:'The t-Distribution',body:'In real life, you almost NEVER know the population standard deviation Пғ. So you estimate it with the sample standard deviation s. This substitution introduces extra uncertainty вҖ” you\'re not quite as sure about the spread. To account for this, we use the t-distribution instead of the normal distribution. The t-distribution looks like a normal distribution but with HEAVIER TAILS вҖ” meaning extreme values are more likely.',keys:[
        'The t-distribution has one parameter: degrees of freedom (df). For one sample, df = n вҲ’ 1.',
        'Heavier tails mean that critical values from the t-distribution are LARGER than from the normal вҖ” wider confidence intervals, harder to reject HвӮҖ.',
        'As df increases (larger samples), the t-distribution approaches the normal. At df вүҘ 30, they\'re nearly identical.',
        'Why this matters: for small samples, the t-distribution gives more conservative (wider) intervals, which is appropriate because small samples have more uncertainty.',
        'Use Table B to look up critical t-values: find your df (row) and confidence level (column).',
        'On the exam: if testing a mean вҶ’ always use t. If testing a proportion вҶ’ use z (because the SE formula for proportions doesn\'t involve Пғ).'

  {
    id:'estimation', title:'Estimation & Confidence Intervals', icon:'ruler',
    sections:[
      {title:'From Sampling Distributions to Estimation',body:'Now we use the sampling distribution to make our first real INFERENCE about the population. We have a sample, we\'ve computed a statistic (like xМ„ = 7.2), and we want to say something about the true population parameter (Ој). There are two approaches: a point estimate (a single number) and an interval estimate (a range of plausible values). The point estimate is your best guess; the interval estimate shows how UNCERTAIN that guess is.',keys:[
        'Point estimate: a single number. xМ„ is a point estimate of Ој. ПҖМӮ is a point estimate of ПҖ. Simple but tells you nothing about precision.',
        'Interval estimate (confidence interval): a range [lower, upper] that we\'re confident contains the true parameter. Shows the uncertainty inherent in using a sample.',

      ]},
      {title:'Confidence Interval for a Mean',body:'When you want to estimate the true population mean Ој from your sample, you build a confidence interval. This is one of the most common procedures in statistics.',formulas:[
        {label:'Confidence interval for Ој',tex:'\\bar{x} \\pm t^{*} \\cdot \\frac{s}{\\sqrt{n}}',note:'xМ„ = sample mean (your point estimate). t* = critical value from Table B based on df = nвҲ’1 and confidence level. s/вҲҡn = standard error of the mean. The whole expression t* Г— s/вҲҡn is the margin of error.'}
      ],keys:[
        'The correct interpretation: "We are 95% confident that the true population mean lies in [lower, upper]." This means if we repeated this process many times, 95% of the intervals we\'d construct would contain Ој.',
        'WRONG interpretation: "There is a 95% probability that Ој is in this interval." NO вҖ” Ој is a fixed number, it\'s either in the interval or it\'s not. The randomness is in the INTERVAL, not in Ој.',

        'If 0 is NOT in the CI for a difference, the difference is statistically significant at that confidence level'
      ]},
      {title:'Confidence Interval for a Proportion',body:'When your data is categorical (yes/no, success/failure), you estimate the population proportion ПҖ using the sample proportion ПҖМӮ. The CI uses z* instead of t* because the SE formula for proportions doesn\'t involve an unknown Пғ.',formulas:[
        {label:'Confidence interval for ПҖ',tex:'\\hat{\\pi} \\pm z^{*} \\cdot \\sqrt{\\frac{\\hat{\\pi}(1-\\hat{\\pi})}{n}}',note:'z*: 1.645 (90%), 1.960 (95%), 2.576 (99%). Notice we use ПҖМӮ (not ПҖвӮҖ) in the SE here вҖ” for ESTIMATION we use the sample proportion. For TESTING we\'ll use the null value ПҖвӮҖ. This distinction matters on the exam.'}
      ],keys:[
        'Conditions: nПҖМӮ вүҘ 10 AND n(1вҲ’ПҖМӮ) вүҘ 10 (enough successes and failures for the normal approximation)',
        'The margin of error is widest when ПҖМӮ вүҲ 0.5 and narrowest when ПҖМӮ is near 0 or 1'
      ]},
      {title:'Sample Size Determination',body:'Before collecting data, you can calculate the minimum sample size needed to achieve a desired precision (margin of error). This is practical and appears on every exam. The idea: rearrange the CI formula to solve for n.',formulas:[
        {label:'For a mean',tex:'n = \\left(\\frac{z^* \\cdot \\sigma}{M}\\right)^{\\!2}',note:'You need a preliminary estimate of Пғ (from a pilot study or previous research). M = desired margin of error. Always round UP to the next integer.'},
        {label:'For a proportion',tex:'n = \\pi(1-\\pi) \\cdot \\left(\\frac{z^*}{M}\\right)^{\\!2}',note:'If ПҖ is unknown, use ПҖ = 0.5 вҖ” this gives the MAXIMUM (most conservative) sample size because 0.5 Г— 0.5 = 0.25 is the largest possible product. Exam example: within 0.67%, 99% confidence, ПҖ вүҲ 0.40 вҶ’ n = 0.4(0.6)(2.576/0.0067)ВІ вүҲ 35,450.'}
      ]}
    ]
  },
  {
    id:'testing', title:'Hypothesis Testing', icon:'scale',
    sections:[
      {title:'What Is Hypothesis Testing and Why Do We Need It?',body:'Confidence intervals ESTIMATE a parameter. Hypothesis testing DECIDES a yes/no question. "Is the proportion of satisfied users above 70%?" "Is there a difference between iOS and Android?" These require a decision framework. The logic is elegant: assume the "boring" answer is true (nothing special happening), then check if the data is too extreme to be explained by that boring answer. If it is, you reject the boring answer.',keys:[
        'HвӮҖ (null hypothesis): the default, "no effect" claim. It ALWAYS contains an = sign. Examples: Ој = 100, ПҖ = 0.5, ОјвӮҒ = ОјвӮӮ.',
        'HвӮҗ (alternative hypothesis): what you actually want to show. It uses вү  (two-sided), < or > (one-sided).',
        'The test statistic measures: how far is my sample from what HвӮҖ predicts, measured in standard errors? It\'s essentially a z-score.',
        'The p-value answers: IF HвӮҖ were true, what\'s the probability of seeing data THIS extreme or more? Small p вҶ’ data is surprising under HвӮҖ вҶ’ evidence against HвӮҖ.',
        'We NEVER "accept HвӮҖ" вҖ” we either reject it or fail to reject it (insufficient evidence). Not finding evidence against something is NOT the same as proving it true.'
      ]},
      {title:'The 5-Step Framework',body:'EVERY hypothesis test on the exam follows the same 5 steps. Learn this framework cold вҖ” it applies to z-tests, t-tests, chi-square tests, everything. Question 4 on the exam is always a full 5-step calculation.',steps:[
        {n:1,t:'Check Assumptions',d:'Three things to check: (1) Data from a random sample or randomized experiment. (2) Distribution conditions вҖ” for proportions: nПҖвӮҖ вүҘ 10 and n(1вҲ’ПҖвӮҖ) вүҘ 10. For means: either the population is normal OR n вүҘ 30 (CLT). (3) Independence of observations.'},
        {n:2,t:'State Hypotheses',d:'Write HвӮҖ and HвӮҗ using proper notation. HвӮҖ ALWAYS has =. HвӮҗ has вү  (two-sided), < or > (one-sided). Two-sided means "is there ANY difference?" One-sided means "is it specifically larger/smaller?"'},
        {n:3,t:'Calculate Test Statistic',d:'General formula: (sample estimate вҲ’ null value) / standard error. This standardizes the difference: how many SEs is the sample away from what HвӮҖ claims? For proportions: z = (ПҖМӮ вҲ’ ПҖвӮҖ) / SE. For means: t = (xМ„ вҲ’ ОјвӮҖ) / SE.'},
        {n:4,t:'Find P-value',d:'Use the test statistic to find the probability. One-sided: area in one tail. Two-sided: area in both tails (multiply one-tail p by 2). Smaller p = stronger evidence against HвӮҖ. Look up in Table B for t, or use z-table for proportions.'},
        {n:5,t:'State Conclusion',d:'If p вүӨ Оұ: "We reject HвӮҖ. There is sufficient evidence at the Оұ level to conclude [HвӮҗ in words]." If p > Оұ: "We fail to reject HвӮҖ. There is insufficient evidence to conclude [HвӮҗ in words]." ALWAYS state the conclusion in context of the problem.'}
      ]},
      {title:'Z-test for One Proportion',body:'Use this when you have ONE categorical variable and want to test if the population proportion equals some specific value ПҖвӮҖ. Example: "Is the proportion of 5-star apps above 25%?"',formulas:[
        {label:'Test statistic',tex:'z = \\frac{\\hat{\\pi} - \\pi_0}{\\sqrt{\\dfrac{\\pi_0(1-\\pi_0)}{n}}}',note:'IMPORTANT: the SE uses ПҖвӮҖ (the null hypothesis value), NOT ПҖМӮ. This is different from confidence intervals where we use ПҖМӮ. Why? Because in testing, we\'re computing probabilities UNDER the assumption that HвӮҖ is true, so we use the HвӮҖ value. Exam example: HвӮҖ: ПҖ = 0.25, ПҖМӮ = 0.32, n = 100 вҶ’ z = (0.32 вҲ’ 0.25)/вҲҡ(0.25 Г— 0.75/100) = 0.07/0.0433 = 1.62.'}
      ]},
      {title:'T-test for One Mean',body:'Use this when you have ONE quantitative variable and want to test if the population mean equals some specific value ОјвӮҖ. Example: "Is the average app size greater than 100 MB?" We use t instead of z because Пғ is unknown.',formulas:[
        {label:'Test statistic',tex:'t = \\frac{\\bar{x} - \\mu_0}{s \\,/\\, \\sqrt{n}} \\qquad df = n - 1',note:'Same logic as the z-test but using s instead of Пғ, so the distribution is t with df = n вҲ’ 1. For large n (>30), t and z give nearly identical results.'}
      ]},
      {title:'Type I and Type II Errors',body:'Any decision can be wrong. There are exactly two ways a hypothesis test can go wrong, and understanding them is critical for the exam вҖ” especially the COVID testing scenario.',subs:[
        {name:'Type I Error (False Positive)',desc:'You REJECT HвӮҖ when HвӮҖ is actually TRUE. You concluded there\'s an effect when there isn\'t one. The probability of this is exactly Оұ (your significance level). That\'s what Оұ IS вҖ” the risk you\'re willing to accept of making a Type I error.',detail:'Example: COVID test says "infected" when the person is healthy. A spam filter flags a legitimate email. A court convicts an innocent person.'},
        {name:'Type II Error (False Negative)',desc:'You FAIL TO REJECT HвӮҖ when HвӮҖ is actually FALSE. You missed a real effect. The probability of this is ОІ. Power = 1 вҲ’ ОІ = the probability of correctly detecting a real effect.',detail:'Example: COVID test says "not infected" when the person IS infected. A spam filter lets through a scam email. A court acquits a guilty person.'}
      ],keys:[
        'Decreasing Оұ (making it harder to reject HвӮҖ) INCREASES ОІ (makes it easier to miss real effects). This is always a trade-off.',
        'Increasing n decreases BOTH types of errors вҖ” this is the only free lunch in statistics.',
        'Power = 1 вҲ’ ОІ = probability of correctly rejecting a false HвӮҖ. Higher power is better. Increased by: larger n, larger effect size, larger Оұ.',
        'COVID context (exam question): missing an infection (Type II) is much worse than a false positive (Type I). So you use a LARGER Оұ (like 0.05 instead of 0.01) to make it easier to reject HвӮҖ (detect infections), accepting more false positives.',
        'At Оұ = 0.01, about 1% of all tests reject HвӮҖ purely by chance. If 279 articles report p < 0.01, about 3 (279 Г— 0.01) could be by chance alone.'
      ]},
      {title:'Publication Bias',body:'This is a real-world problem that the exam tests. Journals prefer publishing significant results (p < 0.05). Studies that find "no effect" are less likely to be published. The consequence: if you only read published literature, you get a distorted picture вҖ” significance appears more common than it truly is. If 20% of studies worldwide find p < 0.01 but a journal publishes 93% significant results, that discrepancy is publication bias.',keys:[
        'At Оұ = 0.05, 5% of studies will find "significant" results by pure chance even when HвӮҖ is true',
        'File drawer problem: non-significant studies sit in researchers\' file drawers, never published',
        'This inflates the apparent success rate of hypotheses in the literature',
        'On the exam: when they ask why a journal has a much higher proportion of significant results than the overall rate, the answer is publication bias'
      ]}
    ]
  },
  {
    id:'twogroups', title:'Comparing Two Groups', icon:'swords',
    sections:[
      {title:'Why Compare Two Groups?',body:'Most interesting questions in statistics compare groups. "Do men earn more than women?" "Did satisfaction improve after the redesign?" "Is the new drug better than the placebo?" This chapter extends hypothesis testing from one group to TWO. The critical first question you must ask is: are the groups PAIRED or INDEPENDENT? Getting this wrong means using the wrong test.',keys:[
        'Bivariate setup: the explanatory variable defines the two groups (e.g., treatment vs control), the response variable is what you compare (e.g., satisfaction score)',
        'The test you use depends on: (1) paired or independent, (2) means or proportions',
        'On the exam: test selection (Q2) often involves comparing two groups вҖ” you need to identify the right test quickly'
      ]},
      {title:'Paired vs Independent Samples',body:'This is one of the most important distinctions in the course. The exam will describe a scenario and expect you to identify which type it is, because paired and independent samples require different tests.',subs:[
        {name:'Paired (Dependent) Samples',desc:'Each observation in one group is naturally linked to one in the other group. The SAME subjects are measured twice (before/after), or subjects are matched in pairs. Example: measuring the same viewers\' ratings for season 1 and season 2 of a show. Or testing blood pressure before and after a medication for the same patients.',detail:'Why paired is special: by looking at the DIFFERENCES within each pair, you eliminate person-to-person variation. Person A might just rate everything higher вҖ” doesn\'t matter, because you\'re looking at their change. This makes paired tests more powerful. Analysis: compute d = xвӮҒ вҲ’ xвӮӮ for each pair, then do a ONE-SAMPLE t-test on the differences with HвӮҖ: Ој_d = 0.'},
        {name:'Independent (Unpaired) Samples',desc:'The two groups are completely separate вҖ” no natural pairing. Different people, different subjects. Example: comparing satisfaction between iOS users and Android users (different people). Or comparing exam scores between two different classes.',detail:'Analysis: compare the two sample means directly using a two-sample t-test. The SE accounts for variability in BOTH groups. This test is less powerful than paired because you can\'t eliminate individual variation.'}
      ],keys:[
        'Keywords for paired: "before and after," "the same subjects," "matched pairs," "repeated measures," "season 1 vs season 2 for the same shows"',
        'Keywords for independent: "two different groups," "men vs women," "iOS vs Android," "randomly assigned to treatment or control"'
      ]},
      {title:'Two-Sample T-test (Independent)',body:'Use when you have TWO independent groups and want to compare their MEANS. Example: do Xbox gamers play more hours per week than PC gamers?',formulas:[
        {label:'Test statistic',tex:'t = \\frac{\\bar{x}_1 - \\bar{x}_2}{\\sqrt{\\dfrac{s_1^2}{n_1} + \\dfrac{s_2^2}{n_2}}}',note:'Numerator: the difference in sample means. Denominator: the SE of the difference вҖ” accounts for variability in both groups. HвӮҖ: ОјвӮҒ = ОјвӮӮ (equivalently, ОјвӮҒ вҲ’ ОјвӮӮ = 0). For df: use the conservative approach: df вүҲ smaller of (nвӮҒвҲ’1, nвӮӮвҲ’1). Or your calculator/software uses the Welch approximation.'}
      ],keys:[
        'Assumptions: both samples are random, independent of each other, both populations approximately normal (or both n вүҘ 30)',
        'If the test statistic is large (far from 0), the groups differ more than expected by chance alone'
      ]},
      {title:'Z-test for Two Proportions',body:'Use when you have TWO independent groups and want to compare PROPORTIONS (categorical outcome). Example: is the proportion of 5-star reviews different between free and paid apps?',formulas:[
        {label:'Pooled proportion',tex:'\\hat{\\pi} = \\frac{x_1 + x_2}{n_1 + n_2}',note:'Under HвӮҖ, both groups have the SAME proportion, so we pool them together for the best estimate. xвӮҒ and xвӮӮ are the number of "successes" in each group.'},
        {label:'Test statistic',tex:'z = \\frac{\\hat{\\pi}_1 - \\hat{\\pi}_2}{\\sqrt{\\hat{\\pi}(1-\\hat{\\pi})\\!\\left(\\dfrac{1}{n_1} + \\dfrac{1}{n_2}\\right)}}',note:'We use z (not t) because proportions don\'t involve estimating Пғ. The pooled proportion is used in the SE because we assume HвӮҖ is true (proportions are equal).'}
      ]},
      {title:'CI for Difference in Means',body:'Just like a CI for a single mean, but now for the DIFFERENCE ОјвӮҒ вҲ’ ОјвӮӮ. This tells you the range of plausible values for how much the groups differ.',formulas:[
        {label:'Confidence interval',tex:'(\\bar{x}_1 - \\bar{x}_2) \\pm t^* \\cdot \\sqrt{\\frac{s_1^2}{n_1} + \\frac{s_2^2}{n_2}}',note:'Key interpretation: if 0 is NOT in the interval, the difference is statistically significant at that confidence level. If the entire interval is positive, group 1 has a significantly higher mean. If entirely negative, group 2 is higher.'}
      ]}
    ]
  },
  {
    id:'categorical', title:'Categorical Data Analysis', icon:'clipboard',
    sections:[
      {title:'When Do We Use Categorical Methods?',body:'All the tests we\'ve seen so far involve at least one quantitative variable (means, regression). But what if BOTH variables are categorical? "Is there an association between car color and fuel type?" "Is the distribution of app categories the same for free and paid apps?" You can\'t compute a mean for categories вҖ” you need a completely different approach. This is where the chi-square test comes in. On the exam, Q5 is typically about categorical data (odds ratio, chi-square, standardized residuals).',keys:[
        'Both variables must be categorical (nominal or ordinal with a small number of levels)',
        'Data is organized in a contingency table (rows = one variable, columns = the other, cells = counts)',
        'The key question: are the two variables INDEPENDENT (no association) or DEPENDENT (associated)?',
        'If independent: knowing someone\'s car fuel type tells you nothing about their car color',
        'If dependent: certain fuel types are associated with certain colors more than expected by chance'
      ]},
      {title:'Chi-Square Test of Independence',body:'The chi-square test compares what you OBSERVED in the data to what you would EXPECT if the variables were truly independent. If the difference is large enough, you conclude the variables are associated.',formulas:[
        {label:'Expected frequency',tex:'f_e = \\frac{\\text{row total} \\times \\text{column total}}{\\text{grand total}}',note:'This is what you\'d expect in each cell IF the variables were independent. The logic: if 30% of all cars are blue and 10% are electric, then you\'d expect 30% Г— 10% = 3% of cars to be blue AND electric. The formula does this calculation using totals.'},
        {label:'Chi-square statistic',tex:'\\chi^2 = \\sum \\frac{(f_o - f_e)^2}{f_e}',note:'For each cell: how much does observed differ from expected? Square it (so differences don\'t cancel), divide by expected (to standardize). Sum over ALL cells. Larger ПҮВІ = bigger discrepancy from independence = stronger evidence of association.'},
        {label:'Degrees of freedom',tex:'df = (r-1)(c-1)',note:'r = number of rows, c = number of columns. A 3Г—4 table has (2)(3) = 6 df.'}
      ],keys:[
        'HвӮҖ: the variables are independent (no association). HвӮҗ: the variables are dependent (there IS an association).',
        'The chi-square test is ALWAYS right-tailed вҖ” you can never get a negative ПҮВІ, and larger values indicate more evidence against independence.',
        'Critical assumption: ALL expected frequencies must be вүҘ 5. If any cell has f_e < 5, the chi-square approximation breaks down.',
        'Chi-square tells you IF there\'s an association, but not WHERE or HOW STRONG. For that, you need standardized residuals and odds ratios.'
      ]},
      {title:'Standardized Residuals',body:'After finding a significant chi-square result, you want to know WHICH cells are driving the association. Standardized residuals tell you exactly which observed counts are unusually high or low compared to what\'s expected. They\'re like z-scores for contingency table cells.',formulas:[
        {label:'Standardized residual',tex:'z = \\frac{f_o - f_e}{SE}',note:'Positive z: observed is HIGHER than expected (more than expected under independence). Negative z: observed is LOWER. |z| > 2: notable departure from independence. |z| > 3: highly significant вҖ” this cell is a major driver of the association.'},
        {label:'Standard error',tex:'SE = \\sqrt{f_e \\cdot (1 - p_{\\text{row}}) \\cdot (1 - p_{\\text{col}})}',note:'p_row = row total / grand total, p_col = column total / grand total. Exam example: blue electric cars f_o = 17, f_e = 8.66, standardized residual = 3.5 вҶ’ there are significantly MORE blue electric cars than expected if color and fuel type were independent.'}
      ]},
      {title:'Odds and Odds Ratio',body:'Odds and odds ratios give you another way to quantify the strength of an association between two categorical variables, especially useful for 2Г—2 tables. Odds are NOT the same as probability вҖ” this is a common confusion.',formulas:[
        {label:'Odds',tex:'\\text{odds} = \\frac{\\text{\\# with outcome}}{\\text{\\# without outcome}}',note:'Probability = successes/total. Odds = successes/failures. If 30 out of 100 people have the outcome: probability = 30/100 = 0.30, odds = 30/70 = 0.43. They\'re different! Odds can be greater than 1; probability cannot.'},
        {label:'Odds ratio',tex:'OR = \\frac{\\text{odds}_1}{\\text{odds}_2}',note:'Compares odds between two groups. OR = 1: same odds in both groups (no association). OR > 1: first group has higher odds. OR < 1: first group has lower odds. Exam example: electric cars have odds of being blue = 17/11 = 1.55. Non-electric: 134/326 = 0.41. OR = 1.55/0.41 = 3.76 вҶ’ electric cars have nearly 4Г— the odds of being blue.'}
      ]}
    ]
  },
  {
    id:'regression', title:'Linear Regression', icon:'trending',
    sections:[
      {title:'What Is Regression and Why Does It Matter?',body:'Regression is the workhorse of statistics. It does two things: (1) PREDICTS the value of one variable from another, and (2) QUANTIFIES the relationship between variables. Everything you\'ve learned about correlation, hypothesis testing, and confidence intervals comes together here. On the exam, Q3 is ALWAYS regression вҖ” interpreting output, calculating RВІ, comparing models. This topic carries the most weight.',keys:[
        'Simple regression: one predictor (x) вҶ’ one outcome (y). The line Е· = a + bx.',
        'The goal: find the line that best predicts y from x, where "best" means minimizing prediction errors',
        'Regression goes beyond correlation: correlation says "there\'s a relationship," regression says "here\'s the equation and I can predict new values"',
        'The regression output table (given on the exam) contains everything you need: estimates, SEs, t-values, p-values, RВІ'
      ]},
      {title:'The Regression Equation',body:'The least squares method finds the line that minimizes the sum of squared residuals (SSE). Why squared? So that positive and negative errors don\'t cancel out.',formulas:[
        {label:'Prediction equation',tex:'\\hat{y} = a + bx',note:'a = intercept: the predicted y when x = 0. This may or may not be meaningful in context (if x = 0 is outside the data range, the intercept is an extrapolation). b = slope: for every 1-unit increase in x, the predicted y changes by b units. The sign of b gives the direction of the relationship.'},
        {label:'RВІ (Coefficient of Determination)',tex:'R^2 = 1 - \\frac{SSE}{TSS} = \\frac{TSS - SSE}{TSS}',note:'RВІ is the PROPORTION of variance in y explained by x. TSS = total variation in y (if you just used Иі to predict everyone). SSE = leftover variation (prediction errors). RВІ = 0.80 means the model explains 80% of the variation вҖ” prediction error is 80% smaller than using the mean. For simple regression, RВІ = rВІ.'}
      ]},
      {title:'Testing the Slope',body:'The most important question about a regression: is the slope significantly different from zero? If ОІ = 0, there is NO linear relationship вҖ” x doesn\'t help predict y at all. This is a hypothesis test using the 5-step framework.',formulas:[
        {label:'Test statistic',tex:'t = \\frac{b}{SE(b)} \\qquad df = n - 2',note:'b = estimated slope from the regression output. SE(b) = standard error of the slope (also in the output). df = n вҲ’ 2 because we estimate two parameters (a and b). Exam example: b = 216, SE(b) = 82.7 вҶ’ t = 216/82.7 = 2.61. For n = 5000, df = 4998. Critical value at Оұ = 0.01 two-sided вүҲ 2.576. Since 2.61 > 2.576, reject HвӮҖ вҖ” significant.'}
      ],steps:[
        {n:1,t:'Assumptions',d:'(1) Random sample/randomized experiment. (2) Linearity вҖ” the relationship between x and y should be roughly linear (check scatterplot). (3) Equal conditional SDs вҖ” the spread of y should be similar at all values of x (check residual plot). (4) Normality of residuals.'},
        {n:2,t:'Hypotheses',d:'HвӮҖ: ОІ = 0 (no linear relationship). HвӮҗ: ОІ вү  0 (there IS a linear relationship). Usually two-sided.'},
        {n:3,t:'Calculate t',d:'t = b / SE(b). Both values come directly from the regression output table.'},
        {n:4,t:'P-value',d:'Look up |t| in Table B with df = n вҲ’ (p+1), where p = number of predictors. For simple regression, df = n вҲ’ 2.'},
        {n:5,t:'Conclusion',d:'If p < Оұ: "There is sufficient evidence of a significant linear relationship between x and y." If p > Оұ: "No significant linear relationship detected."'}
      ]},
      {title:'Residual Analysis',body:'Residuals (e = y вҲ’ Е·) are the leftover variation that the model didn\'t capture. Analyzing them tells you if your model is appropriate. If residuals show patterns, the model is missing something.',keys:[
        'Residual = y вҲ’ Е· (actual minus predicted). Positive = underpredicted. Negative = overpredicted.',
        'Plot residuals vs predicted values: should look like a RANDOM scatter with no pattern. A curve suggests the relationship isn\'t linear. A funnel shape suggests unequal variability.',
        'Residuals should be approximately normal (check with a histogram or normal probability plot)',
        'SSE = sum of squared residuals = ОЈ(y вҲ’ Е·)ВІ. This is what the regression minimized.',
        'Typical residual size вүҲ вҲҡ(SSE/n). This gives you a sense of how far off predictions usually are. Exam example: SSE = 80.9 billion, n = 5000 вҶ’ typical residual вүҲ вҲҡ(80.9B/5000) вүҲ 4023. If an actual residual is 962, that\'s SMALLER than typical вҖ” a pretty good prediction.'
      ]}
    ]
  },
  {
    id:'multiple-reg', title:'Multiple Regression', icon:'layers',
    sections:[
      {title:'Why Multiple Regression?',body:'In real life, outcomes depend on MANY factors, not just one. Car prices depend on mileage, engine size, number of seats, gearbox type, and more. Simple regression with one predictor leaves out important information. Multiple regression handles this вҖ” it models the effect of MANY predictors simultaneously, each controlling for the others. This is the most powerful tool in the course and the focus of Q3 on every exam.',keys:[
        'Extension of simple regression: from one predictor to many',
        'The key advantage: each coefficient shows the effect of one variable WHILE HOLDING ALL OTHERS CONSTANT. This is how you control for confounding.',
        'Can include both quantitative predictors (mileage, engine size) and categorical predictors (gearbox type, species) using dummy variables',
        'The regression output table on the exam gives you everything: estimates, SEs, t-values for each predictor'
      ]},
      {title:'The Multiple Regression Equation',formulas:[
        {label:'General equation',tex:'\\hat{y} = a + b_1 x_1 + b_2 x_2 + \\cdots + b_p x_p',note:'a = intercept (predicted y when ALL predictors are 0). Each bбөў = change in Е· per 1-unit increase in xбөў, HOLDING ALL OTHER VARIABLES CONSTANT. This "holding constant" part is crucial вҖ” it\'s what separates multiple regression from running several simple regressions. p = number of predictors.'}
      ],keys:[
        'Interpretation of bвӮҒ: "For every 1-unit increase in xвӮҒ, the predicted y changes by bвӮҒ units, assuming all other variables stay the same."',
        'Example: Е· = 89.8 + 0.8(age) вҲ’ 3.4(sex_male) вҲ’ 0.7(age Г— sex_male). For a 5-year-old male: 89.8 + 0.8(5) вҲ’ 3.4(1) вҲ’ 0.7(5Г—1) = 86.9. You MUST include ALL terms.',
        'RВІ works the same: proportion of variance explained. But with more predictors, RВІ always increases (even with useless predictors), so we also look at adjusted RВІ.'
      ]},
      {title:'Dummy Variables',body:'How do you put a categorical variable (like gearbox type: manual/automatic) into a regression equation that only works with numbers? You create DUMMY VARIABLES вҖ” binary (0/1) indicators. If the categorical variable has k levels, you need exactly (kвҲ’1) dummies. One level becomes the REFERENCE category (coded as all 0s).',keys:[
        'Binary variable (2 levels, e.g., sex): 1 dummy variable. sex_male = 1 if male, 0 if female. Female is the reference. The coefficient tells you the difference between males and females.',
        '3 categories (e.g., species: Adelie, Chinstrap, Gentoo): 2 dummies. species_chinstrap = 1 if chinstrap else 0. species_gentoo = 1 if gentoo else 0. Adelie is the reference (both dummies = 0). The coefficient for species_chinstrap = how much chinstrap differs from Adelie.',
        'The reference category matters for interpretation but not for the overall model fit.',
        'On the exam: be able to write out the prediction for a specific combination of variable values, including dummy variables.'
      ]},
      {title:'Interaction Terms',body:'Sometimes the effect of one variable DEPENDS on another. For example, the effect of age on body length might be different for males vs females. An interaction term captures this вҖ” it\'s the product of two variables added to the model.',formulas:[
        {label:'Model with interaction',tex:'\\hat{y} = a + b_1 x_1 + b_2 x_2 + b_3\\,(x_1 \\times x_2)',note:'bвӮғ is the interaction coefficient. It tells you: how much does the slope of xвӮҒ change per unit of xвӮӮ? If bвӮғ is significant, the effect of xвӮҒ on y depends on the value of xвӮӮ. Example: Е· = 89.8 + 0.8(age) вҲ’ 3.4(sex_male) вҲ’ 0.7(age Г— sex_male). The slope of age for females is 0.8. For males it\'s 0.8 + (вҲ’0.7)(1) = 0.1. Age affects body length much more for females than males.'}
      ]},
      {title:'Standardized Coefficients',body:'Regular coefficients (b) are in the units of their variables вҖ” you can\'t compare a coefficient in "km" to one in "cc" to see which matters more. Standardized coefficients (b*) put everything on the same scale, letting you compare relative importance.',formulas:[
        {label:'Standardized coefficient',tex:'b_i^{\\,*} = b_i \\cdot \\frac{s_{x_i}}{s_y}',note:'Unitless. Interpretation: a 1-SD increase in xбөў is associated with a b*бөў-SD change in y. The predictor with the largest |b*| has the greatest effect. Exam example: standardized coefficients are mileage вҲ’0.16, cc 0.07, seats 0.03, gearbox вҲ’0.48. Gearbox has the greatest effect (|вҲ’0.48| is largest).'}
      ]},
      {title:'Comparing Models',body:'When you have multiple possible models (different combinations of predictors), how do you choose the best one? There are two approaches, and the method depends on whether the models are NESTED.',subs:[
        {name:'F-test (ONLY for nested models)',desc:'Model A is nested inside model B if B contains ALL of A\'s variables plus extras. Example: Model 1 (age + sex) is nested in Model 3 (age + sex + foot_length). The F-test asks: do the extra variables significantly improve the model?',detail:'F = [(SSE_reduced вҲ’ SSE_complete)/dfвӮҒ] / [SSE_complete/dfвӮӮ]. dfвӮҒ = difference in number of parameters. dfвӮӮ = df of the complete model (n вҲ’ p вҲ’ 1). If F is large, the extra variables help. Exam example: M1 SSE = 44.4M (df=340), M2 adds 2 dummies SSE = 31.1M (df=338). F = [(44.4вҲ’31.1)/2]/[31.1/338] = 72.7. Critical F вүҲ 3.03. Significant вҖ” species matters.'},
        {name:'AIC / BIC / MDL (for non-nested models)',desc:'When models have DIFFERENT (non-overlapping) variables, you can\'t use the F-test. Example: Model 1 (age + sex) vs Model 2 (foot_length). Neither is a subset of the other.',detail:'These criteria balance fit (lower SSE) against complexity (more parameters). Lower value = better model. They automatically penalize for having too many variables, which helps prevent overfitting.'}
      ],keys:[
        'F-test ONLY works if one model is nested inside the other. If not, use AIC/BIC/MDL.',
        'Exam pattern: Model 1 (age+sex), Model 2 (foot_length), Model 3 (all three). Compare 1 vs 3: F-test (1 nested in 3). Compare 2 vs 3: F-test (2 nested in 3). Compare 1 vs 2: AIC/BIC (not nested вҖ” different variables).',
        'This is tested every exam in Q3.'
      ]},
      {title:'Overfitting and PRESS',body:'A model with too many predictors can fit the training data perfectly but predict NEW data terribly. It captures the noise (random variation) in the training data, not the real pattern. This is overfitting, and it\'s a critical concept for the exam.',keys:[
        'Sign of overfitting: very low training SSE but high prediction error on new data',
        'PRESS (Predicted Residual Sum of Squares): leave-one-out cross-validation. Remove each observation, refit the model, predict the removed observation, measure the error. Sum all these errors.',
        'We EXPECT PRESS > SSE. SSE is based on the data the model was trained on (optimistic). PRESS estimates real-world prediction error (realistic).',
        'If PRESS is much larger than SSE, the model is overfitting вҖ” it\'s too complex for the data.',
        'Fix: simplify the model (remove variables), collect more data, use regularization.',
        'RВІ always increases when you add variables (even useless ones). That\'s why RВІ alone doesn\'t tell you if a model is good вҖ” you need PRESS or AIC/BIC to account for complexity.'
      ]}
    ]
  }

  {
    title:'Chapter 1: The Problem вҖ” We Can\'t Measure Everything',
    body:`Imagine you work at a company that just launched a new app. Your boss asks: "How satisfied are our users?" Simple question, right? But you have 2 million users spread across 50 countries. You can't ask every single one of them. This is the fundamental problem that ALL of statistics exists to solve: we want to know something about a huge group (the POPULATION), but we can only look at a small piece of it (a SAMPLE).

This is where our journey begins. Everything in this course вҖ” every formula, every test, every concept вҖ” is a tool to help us go from "I looked at 500 users" to "here's what I can confidently say about all 2 million users." That jump from sample to population is called STATISTICAL INFERENCE, and it's the entire point.

But before we can make that jump, we need to do two things well: collect good data, and describe what we see.`

  {
    title:'Chapter 2: Describing What We See вҖ” Descriptive Statistics',
    body:`Before we can draw any conclusions, we need to understand what our data looks like. This is Descriptive Statistics вҖ” the "what do we have?" phase.

Think of it like this: you surveyed 500 users and asked their satisfaction (1-10), their age, and their country. The raw data is just 500 rows of numbers. Useless. You need to summarize it.

First, you need to know the TYPE of each variable, because the type determines what you can do with it. Country is NOMINAL (just categories, no order). Satisfaction might be treated as INTERVAL or RATIO (the numbers have meaning, distances are equal). This matters because you can't calculate the "average country" вҖ” that's nonsense. But you CAN calculate the average satisfaction.

For quantitative data, you want two things: where is the CENTER (mean, median) and how SPREAD OUT is it (standard deviation, IQR)? If the average satisfaction is 7.2 with SD = 0.5, that's great вҖ” most people are happy. If it's 7.2 with SD = 3.1, that same average hides the fact that people either love or hate your app.

The z-score is just a way to put any value in context: "how unusual is this compared to the rest?" A z-score of 2 means "this value is 2 standard deviations above average" вҖ” pretty unusual.

So now you can describe your 500 users. But remember вҖ” you want to say something about ALL 2 million. For that, you need to make sure your 500 users are actually representative.`

    title:'Chapter 3: Getting Good Data вҖ” Sampling',
    body:`This is where most studies go wrong, and it's something your exam will definitely test.

If you only surveyed users who complained on Twitter, your data is garbage вҖ” it's biased toward unhappy people. If you only surveyed people in the Netherlands, you can't say anything about users in Brazil. The whole point of good sampling is to make sure your sample LOOKS LIKE a miniature version of the population.

Simple Random Sampling (SRS) is the gold standard: every user has an equal chance. But it's not always practical. What if you want to make sure you hear from users in every country? Use STRATIFIED sampling вҖ” divide by country, then sample from each. What if you don't have a list of all users? Use CLUSTER sampling вҖ” pick random cities, then survey everyone in those cities.

The exam loves to give you a sampling description and ask "what method is this?" and "what biases could occur?" There are three biases to remember: SAMPLING BIAS (your frame doesn't cover everyone), NONRESPONSE BIAS (certain people don't respond), and RESPONSE BIAS (people don't answer truthfully).

And here's a critical distinction: if you just OBSERVE users naturally, that's an observational study вҖ” you can find associations but can't prove causation. If you randomly ASSIGN users to different app versions and compare outcomes, that's an experiment вҖ” now you CAN talk about cause and effect. This is because randomization removes the effects of confounding variables.`
